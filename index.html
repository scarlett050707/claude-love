<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');

:root {
  --bg: #f5f4f2;
  --bg2: #eeecea;
  --surface: #ffffff;
  --surface2: #f0efed;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1a1a1a;
  --text-2: #5a5a5a;
  --text-3: #999;
  --accent: #1a1a1a;
  --accent-inv: #ffffff;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  --font: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'DM Mono', 'Consolas', monospace;
}

/* dark mode */
[data-theme="dark"] {
  --bg: #121212;
  --bg2: #1a1a1a;
  --surface: #1e1e1e;
  --surface2: #252525;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text: #f0f0f0;
  --text-2: #aaa;
  --text-3: #666;
  --accent: #f0f0f0;
  --accent-inv: #121212;
  --shadow: 0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.4);
}

* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* ---- Sidebar ---- */
.sidebar {
  width: 260px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}

.sidebar::before { content: none; }

.sidebar-header { padding: 24px 16px 12px; }

.new-chat-btn {
  width: 100%;
  padding: 11px 16px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: var(--accent-inv);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.new-chat-btn::before { content: none; }
.new-chat-btn:hover { opacity: 0.75; }

.chat-list { flex: 1; overflow-y: auto; padding: 8px 10px; }

.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.chat-item {
  padding: 9px 12px;
  border-radius: var(--radius);
  margin-bottom: 2px;
  cursor: pointer;
  transition: background 0.15s;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}
.chat-item::before { content: none; }
.chat-item:hover { background: var(--bg2); }
.chat-item.active { background: var(--bg2); }
.chat-item.active::after {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--accent);
  border-radius: 2px;
}

.chat-item-title {
  flex: 1; font-size: 13px; font-weight: 400;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-2);
}
.chat-item.active .chat-item-title { color: var(--text); font-weight: 500; }

.chat-item-title input {
  background: transparent; border: none; width: 100%;
  font-size: 13px; outline: none; color: var(--text); font-family: var(--font);
}
.chat-item-title input:focus {
  background: var(--surface); padding: 2px 6px; border-radius: 6px;
}

.chat-item-del {
  opacity: 0; color: var(--text-3); font-size: 15px; transition: opacity 0.15s;
  line-height: 1; flex-shrink: 0;
}
.chat-item:hover .chat-item-del { opacity: 1; }
.chat-item-del:hover { color: var(--text); }

.sidebar-footer {
  padding: 10px;
  border-top: 1px solid var(--border);
  margin-bottom: 0;
}

/* Wallet card - minimal version */
#walletCard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#walletCard .wlabel { font-size: 11px; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; }
#walletCard .wval { font-size: 15px; font-weight: 500; color: var(--text); }

.sidebar-btn {
  width: 100%; padding: 9px 12px;
  background: transparent;
  border: none;
  border-radius: var(--radius);
  margin-bottom: 1px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-2);
  text-align: left;
}
.sidebar-btn:hover { background: var(--bg2); color: var(--text); }

/* ---- Main ---- */
.main { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

.chat-header {
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.chat-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.chat-title::before { content: none; }

.avatar-upload { position: relative; cursor: pointer; }
.avatar-upload input { display: none; }
.avatar-upload:hover::after {
  content: 'change';
  position: absolute;
  top:0;left:0;right:0;bottom:0;
  background: rgba(0,0,0,0.55);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.5px;
  border-radius: 50%;
}

.header-btn {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  color: var(--text-2);
  transition: all 0.15s;
  letter-spacing: 0.2px;
}
.header-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--text); }

/* ---- Messages ---- */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.msg {
  display: flex;
  gap: 10px;
  max-width: 78%;
  animation: msgIn 0.25s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { margin-left: auto; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  background: var(--bg2);
  color: var(--text-2);
  border: 1px solid var(--border);
  background-size: cover;
  background-position: center;
  letter-spacing: 0;
}

.msg-content { flex: 1; min-width: 0; overflow: hidden; }

.msg-text {
  line-height: 1.7;
  font-size: 14px;
  word-break: break-word;
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

.msg.user .msg-text {
  background: var(--accent);
  color: var(--accent-inv);
  padding: 11px 16px;
  border-radius: var(--radius-lg);
  border-bottom-right-radius: 4px;
  font-size: 14px;
}

.msg.ai .msg-text {
  background: var(--surface);
  color: var(--text);
  padding: 11px 16px;
  border-radius: var(--radius-lg);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
  font-size: 14px;
  max-width: 100%;
  overflow-x: hidden;
  word-break: break-word;
  overflow-wrap: break-word;
}

.msg-time {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 5px;
  letter-spacing: 0.2px;
}

.msg-actions {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.msg.ai:hover .msg-actions { opacity: 1; }

.msg-action-btn {
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.msg-action-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--border-strong); }

/* ---- Thinking block ---- */
.thinking-block {
  margin-bottom: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.thinking-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-3);
  user-select: none;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.thinking-toggle:hover { color: var(--text-2); }
.thinking-toggle .t-icon { transition: transform .2s; font-size: 10px; }
.thinking-toggle.open .t-icon { transform: rotate(90deg); }

.thinking-content {
  display: none;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
}
.thinking-content.show { display: block; }

/* ---- Code blocks ---- */
.code-block {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin: 10px 0;
  border: 1px solid var(--border);
  max-width: 100%;
  box-sizing: border-box;
}

.code-header {
  background: var(--bg2);
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.code-lang { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); letter-spacing: 0.5px; }

.code-copy {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
}
.code-copy:hover { background: var(--surface); color: var(--text); }
.code-copy.copied { color: var(--text-3); }

.code-body { padding: 14px; overflow-x: auto; background: var(--bg2); max-width: 100%; }
.code-body pre {
  margin: 0; color: var(--text); font-family: var(--font-mono);
  line-height: 1.6; font-size: 12.5px;
  white-space: pre; word-break: normal; overflow-wrap: normal;
}

/* ---- File card ---- */
.file-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s;
}
.file-card:hover { border-color: var(--border-strong); }
.file-icon { font-size: 22px; }
.file-info { flex: 1; }
.file-name { font-size: 13px; font-weight: 500; color: var(--text); }
.file-size { font-size: 11px; color: var(--text-3); margin-top: 2px; }

.file-btn {
  padding: 6px 14px;
  background: var(--accent);
  color: var(--accent-inv);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  transition: opacity 0.15s;
}
.file-btn:hover { opacity: 0.75; }

/* ---- Activity divider ---- */
.activity-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 0;
  user-select: none;
  animation: msgIn 0.3s ease;
}
.activity-divider span {
  font-size: 10.5px;
  color: var(--text-3);
  letter-spacing: 0.3px;
}

/* ---- Input area ---- */
.input-area {
  padding: 12px 16px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.attach-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.attach-chips:empty { display: none; }

.chip {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--text-2);
}
.chip-del { cursor: pointer; color: var(--text-3); transition: color 0.15s; }
.chip-del:hover { color: var(--text); }

.input-box { display: flex; align-items: flex-end; gap: 8px; }

.attach-btn {
  width: 38px; height: 38px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.attach-btn:hover { background: var(--surface2); border-color: var(--border-strong); }

.input-wrap { flex: 1; position: relative; }

textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: var(--font);
  resize: none;
  outline: none;
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.15s;
  line-height: 1.5;
}
textarea::placeholder { color: var(--text-3); }
textarea:focus { border-color: var(--border-strong); background: var(--surface); }

.send-btn {
  width: 38px; height: 38px;
  background: var(--accent);
  color: var(--accent-inv);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 17px;
  font-weight: 600;
  font-family: var(--font);
  transition: opacity 0.15s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.send-btn:hover { opacity: 0.75; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ---- Attach menu ---- */
.attach-menu {
  position: absolute;
  bottom: 50px;
  left: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: none;
  min-width: 180px;
  overflow: hidden;
  z-index: 100;
}
.attach-menu.show { display: block; animation: popIn 0.2s ease; }

@keyframes popIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.attach-menu-item {
  padding: 11px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-family: var(--font);
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.attach-menu-item:last-child { border: none; }
.attach-menu-item:hover { background: var(--bg2); color: var(--text); }
.attach-menu-item input { display: none; }

/* ---- Modal ---- */
.modal {
  display: none;
  position: fixed;
  top:0;left:0;right:0;bottom:0;
  background: rgba(0,0,0,0.45);
  z-index: 1100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}
.modal.show { display: flex; animation: fadeIn 0.2s; }

@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

.modal-content {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 600px;
  max-height: 88vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(20px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.modal-header {
  padding: 18px 22px;
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.2px;
}

.modal-body { flex:1; overflow-y: auto; padding: 20px 22px; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  background: var(--surface);
}

/* ---- Buttons ---- */
.btn {
  padding: 9px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
  letter-spacing: 0.2px;
}
.btn-primary { background: var(--accent); color: var(--accent-inv); }
.btn-primary:hover { opacity: 0.75; }
.btn-secondary { background: var(--bg2); color: var(--text-2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface2); color: var(--text); }

/* ---- Forms ---- */
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 6px;
  display: block;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.form-input, .form-select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--border-strong);
  background: var(--surface);
}
.form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }

/* ---- API list ---- */
.api-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.api-item {
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.api-item:hover { border-color: var(--border-strong); }
.api-item.active { background: var(--surface); border-color: var(--text); }
.api-item-info { flex: 1; min-width: 0; }
.api-item-name { font-weight: 500; font-size: 13px; color: var(--text); }
.api-item-model { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.api-item-del { color: var(--text-3); font-size: 15px; cursor: pointer; transition: color 0.15s; }
.api-item-del:hover { color: var(--text); }

/* ---- Memory tables ---- */
.memory-tables { display: flex; flex-direction: column; gap: 14px; }
.memory-table {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.table-header {
  background: var(--bg2);
  padding: 11px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.table-title { font-weight: 500; font-size: 13px; color: var(--text); }
.table-title input {
  background: transparent; border: none; color: var(--text);
  font-weight: 500; font-size: 13px; outline: none;
  border-bottom: 1px dashed var(--border-strong); font-family: var(--font);
}
.table-actions { display: flex; gap: 6px; }
.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-family: var(--font);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg2); color: var(--text); }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
th {
  text-align: left; padding: 9px 12px;
  background: var(--bg2); font-size: 11px;
  color: var(--text-3); font-weight: 500;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.4px;
}
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; word-break: break-word; }
tr:last-child td { border: none; }
td input {
  width: 100%; border: none; background: transparent;
  padding: 4px; font-size: 13px; outline: none; color: var(--text); font-family: var(--font);
}
td input:focus { background: var(--bg2); border-radius: 6px; padding: 4px 8px; }

.add-row-btn {
  width: 100%; padding: 10px; background: var(--surface); border: none;
  color: var(--text-3); cursor: pointer; font-size: 12px; font-family: var(--font);
  border-top: 1px solid var(--border); transition: all 0.15s; letter-spacing: 0.3px;
}
.add-row-btn:hover { background: var(--bg2); color: var(--text); }

/* ---- Memory notes ---- */
.memory-notes { display: flex; flex-wrap: wrap; gap: 12px; padding: 4px; }
.memory-note {
  width: calc(50% - 6px);
  min-width: 180px;
  min-height: 120px;
  border-radius: var(--radius);
  padding: 14px;
  position: relative;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.memory-note:hover { box-shadow: var(--shadow-lg); }
.memory-note:nth-child(2n) { background: var(--bg2); }

.memory-note-title {
  font-weight: 500; font-size: 13px; color: var(--text);
  border: none; background: transparent; width: 100%; outline: none;
  border-bottom: 1px solid var(--border); padding-bottom: 5px; font-family: var(--font);
}
.memory-note-body {
  flex: 1; font-size: 12px; color: var(--text-2);
  border: none; background: transparent; width: 100%;
  resize: none; outline: none; line-height: 1.6; font-family: var(--font); min-height: 60px;
}
.memory-note-del {
  position: absolute; top: 8px; right: 10px;
  background: transparent; border: none; border-radius: 50%;
  width: 20px; height: 20px; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s; color: var(--text-3);
}
.memory-note:hover .memory-note-del { opacity: 1; }
.memory-note-del:hover { color: var(--text); }
.memory-note-time { font-size: 10px; color: var(--text-3); text-align: right; }

/* ---- Toast ---- */
.toast {
  position: fixed;
  top: 20px; right: 20px;
  background: var(--accent);
  color: var(--accent-inv);
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font);
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  animation: slideIn 0.3s ease;
  font-weight: 400;
  letter-spacing: 0.2px;
}

/* ---- AI activity msg ---- */
.msg.ai-activity .msg-text {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  border-bottom-left-radius: 4px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-2);
}

/* ---- Mobile toggle ---- */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 1000;
  background: var(--accent);
  color: var(--accent-inv);
  border: none;
  border-radius: var(--radius);
  width: 42px; height: 42px;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  box-shadow: var(--shadow);
}

.mobile-overlay {
  display: none;
  position: fixed;
  top:0;left:0;right:0;bottom:0;
  background: rgba(0,0,0,0.35);
  z-index: 999;
  backdrop-filter: blur(4px);
}

@keyframes slideIn {
  from { opacity:0; transform: translateY(-8px); }
  to   { opacity:1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .mobile-toggle { display: flex !important; }
  .sidebar {
    position: fixed; top:0; left:0; bottom:0;
    z-index: 1001;
    transform: translateX(-100%);
    transition: transform 0.25s;
    width: 280px;
  }
  .sidebar.show { transform: translateX(0); }
  .mobile-overlay.show { display: block; }
  .chat-header { padding-left: 68px; }
  .msg { max-width: 88%; }
  .msg-actions { opacity: 1; }
  .messages { overflow-x: hidden; padding: 14px 14px 6px; gap: 12px; }
  .msg-content { overflow: hidden; min-width: 0; max-width: 100%; }
  .code-block { max-width: 100%; overflow: hidden; }
  .code-body { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .copy-block { max-width: 100%; overflow-x: auto; }
  .msg.ai .msg-text * { max-width: 100%; box-sizing: border-box; }
  table { table-layout: fixed; width: 100%; word-break: break-word; }
  .input-area { padding: 10px 12px 14px; }
}

/* thinking pulse */
.thinking-pulse {
  display: inline-block;
  color: var(--text-3);
  font-size: 18px;
  letter-spacing: 3px;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 1; }
}

<script>
// ========== 全局状态 ==========
let apiConfigs=[];  // API配置列表
let currentAPIId=null;  // 当前使用的API ID
let config={imgUrl:'',imgKey:'',neteaseToken:''};  // 其他配置
let chats=[];
let currentChatId=null;
let memoryTables=[];
let memoryNotes=[];  // 便签记忆
let attachments={img:[],file:[],url:[],music:[]};
let avatars={user:'',ai:''};  // 头像URLs
let editingMessageIndex=null;  // 正在编辑的消息索引
// 图片内存缓存：msgId -> [{dataUrl}]  不存入localStorage
const imgCache={};
// 小克币钱包
let wallet={balance:100};
// 用户位置信息
let userLocation=null;
// 上一条消息的时间戳（用于计算回复间隔）
let lastMessageTime=null;

// ========== 初始化 ==========
window.onload=()=>{
  loadAPIConfigs();
  loadConfig();
  loadChats();
  loadMemory();
  loadAvatars();
  loadWallet();
  loadLocation();
  // 自动IP定位（静默，不弹提示）
  autoDetectIP();
  if(chats.length===0){newChat();}else{switchChat(chats[0].id);}
  renderChatList();
  renderAPIList();
  updateTime();
  setInterval(updateTime,1000);
  // 页面关闭/刷新前强制保存，减少记录丢失
  window.addEventListener('beforeunload', () => { try { saveChats(); } catch(e){} });
  
  document.addEventListener('click',e=>{
    const menu=document.getElementById('attachMenu');
    const btn=document.querySelector('.attach-btn');
    if(!menu.contains(e.target)&&e.target!==btn){menu.classList.remove('show');}
  });
};

// ========== 深色模式 ==========
function toggleDarkMode(){
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  localStorage.setItem('theme', dark ? '' : 'dark');
}
(function(){
  const t = localStorage.getItem('theme');
  if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();

// ========== 时间显示 ==========
function updateTime(){
  const now=new Date();
  const timeStr=now.toLocaleString('zh-CN',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    hour12:false
  });
  document.getElementById('currentTime').textContent=timeStr;
}

// ========== 头像管理 ==========
function loadAvatars(){
  const saved=localStorage.getItem('aiAvatars');
  if(saved) avatars=JSON.parse(saved);
  updateAvatarPreviews();
}

function saveAvatars(){
  localStorage.setItem('aiAvatars',JSON.stringify(avatars));
}

function updateAvatarPreviews(){
  const userPreview=document.getElementById('userAvatarPreview');
  const aiPreview=document.getElementById('aiAvatarPreview');
  if(avatars.user){
    userPreview.style.backgroundImage=`url(${avatars.user})`;
    userPreview.textContent='';
  }
  if(avatars.ai){
    aiPreview.style.backgroundImage=`url(${avatars.ai})`;
    aiPreview.textContent='';
  }

// 设置model下拉框的值，如果选项不存在就自动插入
function setModelSelect(modelId){
  const select=document.getElementById('model');
  // 先尝试直接设置
  select.value=modelId;
  // 如果没选上（值不在选项里），插入一个临时option
  if(select.value!==modelId){
    const opt=document.createElement('option');
    opt.value=modelId;
    opt.textContent=modelId;
    select.insertBefore(opt,select.firstChild);
    select.value=modelId;
  }
}

async function fetchModels(){
  if(!currentAPIId){toast('请先选择或创建API配置');return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先填写API地址和密钥');return;}
  
  // 先保存当前填写的内容（避免切换时丢失）
  api.name=document.getElementById('apiName').value||api.name;
  api.url=document.getElementById('apiUrl').value||api.url;
  api.key=document.getElementById('apiKey').value||api.key;
  
  toast('正在获取模型列表...');
  try{
    const res=await fetch(`${api.url}/models`,{
      headers:{'Authorization':`Bearer ${api.key}`},
      signal:AbortSignal.timeout(10000)
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!data.data||!data.data.length) throw new Error('返回的模型列表为空');
    
    const select=document.getElementById('model');
    const prevModel=api.model||select.value;
    select.innerHTML='';
    data.data
      .sort((a,b)=>a.id.localeCompare(b.id))
      .forEach(m=>{
        const opt=document.createElement('option');
        opt.value=m.id;
        opt.textContent=m.id;
        select.appendChild(opt);
      });
    
    // 恢复该API之前保存的模型，找不到就用列表第一个
    if(prevModel){
      select.value=prevModel;
      if(select.value!==prevModel){
        select.value=data.data[0].id; // 之前的模型不在新列表里，用第一个
      }
    }
    api.model=select.value;
    saveAPIConfigs();
    toast(`已获取 ${data.data.length} 个模型，当前：${select.value}`);
  }catch(e){
    toast('获取失败：'+e.message);
  }
}

function _stripImages(messages, maxCount) {
  return messages.slice(-maxCount).map(m => {
    if (m.role === 'user' && Array.isArray(m.content)) {
      return {
        ...m,
        content: m.content.map(p => {
          if (p.type === 'image_url') {
            return {type:'image_url',image_url:{url:'[图片已从存储中移除]'},_imgCacheId:p._imgCacheId};
          }
          return p;
        })
      };
    }
    return m;
  });
}

function saveChats(){
  // 分级存储：先尝试保存200条，失败则降到100条、50条、20条
  const limits = [200, 100, 50, 20];
  for (const limit of limits) {
    try {
      const toSave = chats.map(c => ({...c, messages: _stripImages(c.messages, limit)}));
      const json = JSON.stringify(toSave);
      localStorage.setItem('aiChats', json);
      return; // 成功即退出
    } catch(e) {
      if (limit === 20) {
        // 最后手段：只保存当前对话的最近20条
        try {
          const cur = chats.find(c => c.id === currentChatId);
          if (cur) {
            const minimal = [{...cur, messages: _stripImages(cur.messages, 20)}];
            localStorage.setItem('aiChats', JSON.stringify(minimal));
          }
        } catch(e2) { console.error('[存储] 严重：无法保存任何对话'); }
      }
    }
  }
}

// ========== 消息渲染 ==========
function renderMessages(messages){
  const box=document.getElementById('messages');
  box.innerHTML='';
  let realIdx=0; // 只计user/assistant的真实轮次，不含activity
  messages.forEach((m,idx)=>{
    if(m.role==='activity'){
      // 活动分隔线
      const ts=m.timestamp||Date.now();
      const timeStr=new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      const div=document.createElement('div');
      div.className='activity-divider';
      div.innerHTML=`<span>— 在${m.appName} · ${timeStr} —</span>`;
      box.appendChild(div);
      return;
    }
    const floor=Math.floor(realIdx/2)+1;
    if(m.role==='user'){
      addUserMessage(m.content,false,m.timestamp,floor,m.intervalMs);
      realIdx++;
    } else if(m.role==='assistant'){
      addAIMessage(m.content,false,m.timestamp,idx,floor,m.elapsed);
      realIdx++;
    }
  });
  box.scrollTop=box.scrollHeight;
}

function addUserMessage(content,scroll=true,timestamp,floorNumber,intervalMs){
  const box=document.getElementById('messages');
  const msg=document.createElement('div');
  msg.className='msg user';
  
  let text='';
  let attachHtml='';
  
  if(typeof content==='string'){text=content;}
  else if(Array.isArray(content)){
    const textPart=content.find(p=>p.type==='text'&&!p._isFile&&!p._isUrl&&!p._isMusic);
    if(textPart) text=textPart.text;
    content.forEach(p=>{
      if(p.type==='image_url'){
        const url=(p._imgCacheId&&imgCache[p._imgCacheId])||p.image_url.url;
        if(url&&url!=='[图片已从存储中移除]'){
          attachHtml+=`<img src="${url}" style="max-width:100%;border-radius:12px;margin-top:10px;border:3px solid white">`;
        } else {
          attachHtml+=`<div class="chip">🖼️ [图片]</div>`;
        }
      }
      if(p._isFile) attachHtml+=`<div class="chip">📄 ${p._name}</div>`;
      if(p._isUrl) attachHtml+=`<div class="chip">🔗 ${p._url}</div>`;
      if(p._isMusic) attachHtml+=`<div class="chip">🎵 ${p._title}</div>`;
    });
  }
  
  const avatarStyle=avatars.user?`background-image:url(${avatars.user});background-size:cover;background-position:center`:'';
  const timeStr=timestamp?formatTime(timestamp):'';
  const floorStr=floorNumber?`#${floorNumber}`:'';
  const intervalStr=intervalMs!=null?`⏱️ 间隔 ${formatInterval(intervalMs)}`:'';
  
  msg.innerHTML=`
    <div class="msg-avatar" style="${avatarStyle}">${avatars.user?'':'U'}</div>
    <div class="msg-content">
      <div class="msg-text">${escapeHtml(text)}</div>
      ${attachHtml}
      <div class="msg-time">${[floorStr,timeStr,intervalStr].filter(Boolean).join(' · ')}</div>
    </div>
  `;
  box.appendChild(msg);
  if(scroll) box.scrollTop=box.scrollHeight;
}

function addAIMessage(content,scroll=true,timestamp,msgIndex,floorNumber,elapsed){
  const box=document.getElementById('messages');
  const msg=document.createElement('div');
  msg.className='msg ai';
  
  const contentDiv=document.createElement('div');
  contentDiv.className='msg-content';
  
  // 思维链处理
  let thinkingHtml='';
  if(content.thinking||content.reasoning_content){
    const thinkText=content.thinking||content.reasoning_content;
    const thinkId='think_'+Date.now();
    thinkingHtml=`
      <div class="thinking-block">
        <div class="thinking-toggle" onclick="toggleThinking('${thinkId}')">
          <span class="t-icon">▶</span>
          <span>💭 思考过程</span>
          <span style="margin-left:auto;font-size:11px;color:var(--浅色文字)">${thinkText.length} 字符</span>
        </div>
        <div class="thinking-content" id="${thinkId}">${escapeHtml(thinkText)}</div>
      </div>
    `;
  }
  
  const actualContent=content.text||content.content||content;
  
  // 文件标记处理
  const fileRegex=/```file:([^\n]+)\n([\s\S]*?)```/g;
  let processed=actualContent;
  
  processed=processed.replace(fileRegex,(match,filename,fileContent)=>{
    const size=new Blob([fileContent]).size;
    const sizeText=size>1024?(size/1024).toFixed(1)+' KB':size+' B';
    const ext=filename.split('.').pop().toLowerCase();
    let icon='📄';
    if(['js','ts','py'].includes(ext)) icon='📜';
    else if(['html','css'].includes(ext)) icon='🌐';
    
    const id='file_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    setTimeout(()=>{
      const btn=document.getElementById(id);
      if(btn){
        btn.onclick=()=>{
          const blob=new Blob([fileContent],{type:'text/plain'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;
          a.download=filename;
          a.click();
          URL.revokeObjectURL(url);
          toast('文件已下载');
        };
      }
    },0);
    
    return `<div class="file-card">
      <div class="file-icon">${icon}</div>
      <div class="file-info">
        <div class="file-name">${filename}</div>
        <div class="file-size">${sizeText}</div>
      </div>
      <button class="file-btn" id="${id}">下载</button>
    </div>`;
  });
  
  // 代码块处理
  const codeRegex=/```(\w+)?\n([\s\S]*?)```/g;
  processed=processed.replace(codeRegex,(match,lang,code)=>{
    const id='code_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    setTimeout(()=>{
      const btn=document.getElementById(id);
      if(btn){
        btn.onclick=()=>{
          navigator.clipboard.writeText(code.trim());
          btn.textContent='已复制';
          btn.classList.add('copied');
          setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied');},2000);
        };
      }
    },0);
    
    return `<div class="code-block">
      <div class="code-header">
        <span class="code-lang">${lang||'code'}</span>
        <button class="code-copy" id="${id}">复制</button>
      </div>
      <div class="code-body"><pre>${escapeHtml(code.trim())}</pre></div>
    </div>`;
  });
  
  // 音乐卡片处理 - 支持多种格式
  // 格式1: 🎵歌曲ID:123456 | 歌名 - 歌手
  // 格式2: 🎵 123456 歌名 歌手
  // 格式3: 歌曲ID: 123456
  const musicPatterns=[
    // 格式1: 🎵歌曲ID:123456 | 歌名 - 歌手
    /🎵\s*歌曲ID[：:]\s*(\d+)\s*\|\s*(.+?)\s*-\s*(.+?)(?=\n|$)/g,
    // 格式2: 歌曲ID: 123456, 歌名: xxx, 歌手: xxx
    /歌曲ID[：:]\s*(\d+)[,，]\s*歌名[：:]\s*(.+?)[,，]\s*歌手[：:]\s*(.+?)(?=\n|$)/g,
    // 格式3: ID:123456 - 歌名(歌手)
    /ID[：:]\s*(\d+)\s*-\s*(.+?)\((.+?)\)/g
  ];
  
  musicPatterns.forEach(pattern=>{
    processed=processed.replace(pattern,(match,songId,title,artist)=>{
      const id='music_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      setTimeout(()=>{
        const btn=document.getElementById(id);
        if(btn){
          btn.onclick=()=>playMusic(songId.trim(),title.trim(),artist.trim());
        }
      },0);
      
      return `<div class="file-card" style="background:linear-gradient(135deg, rgba(147,112,219,0.1), rgba(138,43,226,0.1));">
        <div class="file-icon">🎵</div>
        <div class="file-info">
          <div class="file-name">${title.trim()}</div>
          <div class="file-size">${artist.trim()}</div>
        </div>
        <button class="file-btn" id="${id}" style="background:linear-gradient(135deg, #9370DB, #8A2BE2)">▶ 播放</button>
      </div>`;
    });
  });
  
  const avatarStyle=avatars.ai?`background-image:url(${avatars.ai});background-size:cover;background-position:center`:'';
  const timeStr=timestamp?formatTime(timestamp):'';
  const floorStr=floorNumber?`#${floorNumber}`:'';
  const elapsedStr=elapsed?`⚡ 生成用时 ${elapsed}s`:'';
  
  contentDiv.innerHTML=`
    ${thinkingHtml}
    <div class="msg-text">${processed}</div>
    <div class="msg-time">${[floorStr,timeStr,elapsedStr].filter(Boolean).join(' · ')}</div>
    <div class="msg-actions">
      <button class="msg-action-btn" onclick="regenerateMessage(${msgIndex})">
        
        <span>重新生成</span>
      </button>
      <button class="msg-action-btn" onclick="copyMessage(${msgIndex})">
        
        <span>复制</span>
      </button>
      <button class="msg-action-btn" onclick="editMessage(${msgIndex})">
        
        <span>修改</span>
      </button>
      <button class="msg-action-btn" onclick="deleteRound(${msgIndex})" style="color:#ff6b9d">
        
        <span>删除本轮</span>
      </button>
    </div>
  `;
  
  msg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div>`;
  msg.appendChild(contentDiv);
  
  box.appendChild(msg);
  if(scroll) box.scrollTop=box.scrollHeight;
}

function toggleThinking(id){
  const content=document.getElementById(id);
  const toggle=content.previousElementSibling;
  content.classList.toggle('show');
  toggle.classList.toggle('open');
}

function formatTime(timestamp){
  const date=new Date(timestamp);
  return date.toLocaleString('zh-CN',{
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function formatInterval(ms){
  if(ms<1000) return `${ms}ms`;
  if(ms<60000) return `${(ms/1000).toFixed(0)}秒`;
  if(ms<3600000){
    const m=Math.floor(ms/60000);
    const s=Math.floor((ms%60000)/1000);
    return s>0?`${m}分${s}秒`:`${m}分钟`;
  }
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return m>0?`${h}小时${m}分`:`${h}小时`;
}

function escapeHtml(text){
  const div=document.createElement('div');
  div.textContent=text;
  return div.innerHTML;
}

// ========== AI消息操作 ==========
function regenerateMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  // 找到这条AI消息前面的用户消息
  const userMsg=chat.messages[msgIndex-1];
  if(!userMsg||userMsg.role!=='user'){toast('找不到对应的用户消息');return;}
  
  // 删除这条AI消息及之后所有内容，保留用户消息
  chat.messages=chat.messages.slice(0,msgIndex);
  saveChats();
  renderMessages(chat.messages);
  
  // 直接调用API重新生成，不走input框
  sendMessageWithContent(null);
}

function deleteRound(aiMsgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  // aiMsgIndex是AI消息的索引，前一条是用户消息
  const userIdx=aiMsgIndex-1;
  if(userIdx<0||chat.messages[userIdx]?.role!=='user') return;
  // 删除这一轮（用户+AI，共2条）
  chat.messages.splice(userIdx,2);
  saveChats();
  renderMessages(chat.messages);
  toast('已删除本轮对话');
}

function copyMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  const msg=chat.messages[msgIndex];
  let text='';
  const c=msg.content;
  if(typeof c==='string') text=c;
  else if(c&&typeof c==='object'&&!Array.isArray(c)) text=c.text||c.content||JSON.stringify(c);
  else if(Array.isArray(c)) text=c.filter(p=>p.type==='text').map(p=>p.text).join('\n');
  
  if(!text){toast('没有可复制的文本内容');return;}
  
  navigator.clipboard.writeText(text).then(()=>{
    toast('✅ 已复制到剪贴板');
  }).catch(()=>{
    // 回退方案
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('✅ 已复制');
  });
}

function editMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  if(msgIndex===0||chat.messages[msgIndex-1].role!=='user'){
    toast('只能编辑用户消息后的AI回复');
    return;
  }
  
  const userMsg=chat.messages[msgIndex-1];
  const userText=typeof userMsg.content==='string'?userMsg.content:
    (Array.isArray(userMsg.content)?
      (userMsg.content.find(p=>p.type==='text')?.text||''):'');
  
  document.getElementById('editContent').value=userText;
  editingMessageIndex=msgIndex;
  document.getElementById('editModal').classList.add('show');

}

function saveEditedMessage(){
  if(editingMessageIndex===null) return;
  
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  
  const newText=document.getElementById('editContent').value.trim();
  if(!newText){
    toast('消息内容不能为空');

  // 更新用户消息

// ========== 发送消息 ==========
async function sendMessage(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  const hasAttach=Object.values(attachments).some(a=>a.length>0);
  if(!text&&!hasAttach) return;
  
  if(!currentAPIId){toast('请先在设置中选择或创建API配置');showSettings();return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先完善API配置');showSettings();return;}
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  
  input.value='';
  input.style.height='auto';
  
  let userContent;
  if(!hasAttach){
    userContent=text;
  } else {
    userContent=[];
    if(text) userContent.push({type:'text',text});
    attachments.img.forEach(a=>{
      const cacheId=a.cacheId||('img_'+Date.now()+'_'+Math.random().toString(36).slice(2));
      imgCache[cacheId]=a.dataUrl;
      userContent.push({type:'image_url',image_url:{url:a.dataUrl},_imgCacheId:cacheId});
    });
    attachments.file.forEach(a=>userContent.push({type:'text',text:`【文件：${a.name}】\n\`\`\`\n${a.text.slice(0,50000)}\n\`\`\``,_isFile:true,_name:a.name}));
    attachments.url.forEach(a=>userContent.push({type:'text',text:`【网页：${a.url}】\n\`\`\`\n${a.content}\n\`\`\``,_isUrl:true,_url:a.url}));
    attachments.music.forEach(a=>userContent.push({type:'text',text:`【网易云音乐】\n\`\`\`\n${a.data}\n\`\`\``,_isMusic:true,_title:a.title}));
  }
  
  const timestamp=Date.now();
  const intervalMs=lastMessageTime?(timestamp-lastMessageTime):null;
  lastMessageTime=timestamp;
  
  chat.messages.push({role:'user',content:userContent,timestamp,intervalMs});
  const currentFloor=Math.floor(chat.messages.length/2)+1;
  addUserMessage(userContent,true,timestamp,currentFloor,intervalMs);
  
  if(chat.messages.length===1&&chat.title==='新对话'){
    chat.title=text.slice(0,30);
    document.getElementById('chatTitle').textContent=chat.title;
    renderChatList();
  }
  
  attachments={img:[],file:[],url:[],music:[]};
  renderAttachChips();
  
  await sendMessageWithContent(chat);
}

// 核心发送逻辑（sendMessage和regenerate共用）
async function sendMessageWithContent(chat){
  if(!chat) chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  if(!currentAPIId){toast('请先配置API');return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先完善API配置');return;}
  
  document.getElementById('sendBtn').disabled=true;
  
  // 构建系统提示词
  const now=new Date();
  const timeInfo=`当前时间：${now.toLocaleString('zh-CN',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    weekday:'long',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    hour12:false
  })}`;
  
  // 注入所有消息时间戳信息，让AI能看到每条消息的时间
  let msgTimelineInfo='# 对话时间轴\n';
  chat.messages.forEach((m,i)=>{
    if(m.timestamp){
      const role=m.role==='user'?'用户':'AI';
      const t=new Date(m.timestamp).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const interval=m.intervalMs!=null?`（距上条消息：${formatInterval(m.intervalMs)}）`:'';
      msgTimelineInfo+=`第${Math.floor(i/2)+1}轮-${role} [${t}]${interval}\n`;
    }
  });
  msgTimelineInfo+='\n';
  
  const memoryPrompt=buildMemoryPrompt();
  const locationPrompt=buildLocationPrompt();
  const systemPrompt=`${timeInfo}\n\n${msgTimelineInfo}${locationPrompt}${memoryPrompt}`;
  
  let apiMessages=[];
  if(systemPrompt.trim()) apiMessages.push({role:'system',content:systemPrompt});
  chat.messages.forEach(m=>{
    // 跳过activity分隔线和AI感知消息
    if(m.role==='activity'||m.isAwareness) return;
    let c=m.content;
    if(m.role==='assistant'){
      // 只取纯文本字符串
      if(typeof c==='string') c=c;
      else if(c&&typeof c==='object'&&!Array.isArray(c)) c=c.text||c.content||'';
      else if(Array.isArray(c)) c=c.filter(b=>b&&b.type==='text').map(b=>b.text).join('\n');
      else c='';
      c=String(c).trim();
      if(!c) return; // 跳过空AI消息，空消息会让很多API报错
      apiMessages.push({role:'assistant',content:c});
    } else if(m.role==='user'){
      if(Array.isArray(c)){
        const parts=c.map(p=>{
          if(!p||!p.type) return null;
          if(p.type==='image_url'){
            const url=(p._imgCacheId&&imgCache[p._imgCacheId])||p.image_url?.url||'';
            if(!url||url==='[图片已从存储中移除]'||url.length<50) return null;
            return {type:'image_url',image_url:{url}};
          }
          if(p.type==='text'){
            const t=String(p.text||'').trim();
            if(!t) return null;
            return {type:'text',text:t};
          }
          return null;
        }).filter(Boolean);
        if(!parts.length) return; // 整条用户消息是空的，跳过
        // 如果只有文本部分，简化成字符串
        const onlyText=parts.every(p=>p.type==='text');
        c=onlyText?parts.map(p=>p.text).join('\n'):parts;
      } else {
        c=String(c||'').trim();
        if(!c) return;
      }
      apiMessages.push({role:'user',content:c});
    }
  });
  
  // 创建AI消息占位（流式）
  const box=document.getElementById('messages');
  const loadingMsg=document.createElement('div');
  loadingMsg.className='msg ai';
  const avatarStyle=avatars.ai?`background-image:url(${avatars.ai});background-size:cover;background-position:center`:'';
  const streamContentDiv=document.createElement('div');
  streamContentDiv.className='msg-content';
  const streamTextDiv=document.createElement('div');
  streamTextDiv.className='msg-text';
  streamTextDiv.style.opacity='0.8';
  streamTextDiv.innerHTML='<span class="thinking-pulse">···</span>';
  streamContentDiv.appendChild(streamTextDiv);
  loadingMsg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div>`;
  loadingMsg.appendChild(streamContentDiv);
  box.appendChild(loadingMsg);
  box.scrollTop=box.scrollHeight;
  
  const startTime=Date.now();
  
  try{
    const res=await fetch(`${api.url}/chat/completions`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${api.key}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        model:api.model,
        messages:apiMessages,
        max_tokens:4096,
        stream:true
      })
    });
    
    if(!res.ok){
      const errText=await res.text();
      throw new Error(`HTTP ${res.status}: ${errText.slice(0,200)}`);
    }
    
    // 流式读取
    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let fullText='';
    let thinkingText='';
    let buffer='';
    let scrollTimer=null;
    
    streamTextDiv.innerHTML='';
    streamTextDiv.style.opacity='1';
    let _firstToken=true;
    
    // 节流滚动：最多每100ms滚动一次，避免每个token都触发reflow
    const throttledScroll=()=>{
      if(scrollTimer) return;
      scrollTimer=setTimeout(()=>{
        box.scrollTop=box.scrollHeight;
        scrollTimer=null;
      },100);
    };
    
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        const l=line.trim();
        if(!l||l==='data: [DONE]') continue;
        if(!l.startsWith('data: ')) continue;
        try{
          const json=JSON.parse(l.slice(6));
          const delta=json.choices?.[0]?.delta;
          if(!delta) continue;
          if(delta.reasoning_content) thinkingText+=delta.reasoning_content;
          if(delta.thinking) thinkingText+=delta.thinking;
          if(delta.content){
            fullText+=delta.content;
            if(_firstToken){streamTextDiv.innerHTML='';_firstToken=false;}
            streamTextDiv.appendChild(document.createTextNode(delta.content));
            throttledScroll();
          }
        }catch(e){}
      }
    }
    if(scrollTimer) clearTimeout(scrollTimer);
    
    loadingMsg.remove();
    
    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    
    const storedContent=thinkingText?{text:fullText,thinking:thinkingText}:fullText;
    
    const aiTimestamp=Date.now();
    chat.messages.push({role:'assistant',content:storedContent,timestamp:aiTimestamp,elapsed});
    const msgIdx=chat.messages.length-1;
    const aiFloor=Math.floor(msgIdx/2)+1;
    addAIMessage(storedContent,true,aiTimestamp,msgIdx,aiFloor,elapsed);
    saveChats();
    
    parseAIMemoryCommands(fullText);
    parseAITransfer(fullText);
    
    if(aiFloor%50===0&&memoryTables.length>0){
      toast('已达50轮对话，正在自动整理记忆...');
      setTimeout(()=>aiOrganizeMemory(),1000);
    }
  }catch(e){
    loadingMsg.remove();
    // 如果是流式不支持，回退到普通模式
    if(e.message.includes('stream')||e.message.includes('400')){
      await sendMessageFallback(chat,apiMessages,avatarStyle);
    } else {
      toast('发送失败：'+e.message);
      chat.messages.pop();
    }
  }
  
  document.getElementById('sendBtn').disabled=false;
}

// 非流式回退（兼容不支持stream的API）
async function sendMessageFallback(chat,apiMessages,avatarStyle){
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  const box=document.getElementById('messages');
  const loadingMsg=document.createElement('div');
  loadingMsg.className='msg ai';
  loadingMsg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div><div class="msg-content"><div class="msg-text" style="opacity:.6">正在思考...</div></div>`;
  box.appendChild(loadingMsg);
  const startTime=Date.now();
  try{
    const res=await fetch(`${api.url}/chat/completions`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${api.key}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:api.model,messages:apiMessages,max_tokens:4096})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const msgObj=data.choices[0].message;
    loadingMsg.remove();
    let thinkingText='';
    if(Array.isArray(msgObj.content)){const tb=msgObj.content.find(b=>b.type==='thinking');if(tb) thinkingText=tb.thinking||'';}
    if(!thinkingText&&msgObj.thinking) thinkingText=msgObj.thinking;
    if(!thinkingText&&msgObj.reasoning_content) thinkingText=msgObj.reasoning_content;
    let replyText='';
    if(typeof msgObj.content==='string') replyText=msgObj.content;
    else if(Array.isArray(msgObj.content)) replyText=msgObj.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    const storedContent=thinkingText?{text:replyText,thinking:thinkingText}:replyText;
    const aiTimestamp=Date.now();
    chat.messages.push({role:'assistant',content:storedContent,timestamp:aiTimestamp,elapsed});
    const msgIdx=chat.messages.length-1;
    const aiFloor=Math.floor(msgIdx/2)+1;
    addAIMessage(storedContent,true,aiTimestamp,msgIdx,aiFloor,elapsed);
    saveChats();
    parseAIMemoryCommands(replyText);
    parseAITransfer(replyText);
  }catch(e){
    loadingMsg.remove();
    toast('发送失败：'+e.message);
    chat.messages.pop();
  }
}

function handleImage(e){
  Array.from(e.target.files).forEach(f=>{
    if(f.size>20*1024*1024){toast('图片过大（>20MB）');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const cacheId='img_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const img=new Image();
      img.onload=()=>{
        // 超过1MB或尺寸超大时压缩
        const needCompress=f.size>1*1024*1024||img.width>2000||img.height>2000;
        if(!needCompress){
          attachments.img.push({name:f.name,dataUrl:ev.target.result,cacheId});
          renderAttachChips();
          return;
        }
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        const maxDim=1600;
        if(w>maxDim||h>maxDim){const s=Math.min(maxDim/w,maxDim/h);w=Math.round(w*s);h=Math.round(h*s);}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const compressed=canvas.toDataURL('image/jpeg',0.82);
        attachments.img.push({name:f.name,dataUrl:compressed,cacheId});
        renderAttachChips();
        toast('图片已自动压缩');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  });
  e.target.value='';
  toggleAttachMenu();
}

function handleFile(e){
  const f=e.target.files[0];
  if(!f) return;
  if(f.size>5*1024*1024){toast('文件过大（>5MB）');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    attachments.file.push({name:f.name,text:ev.target.result});
    renderAttachChips();
  };
  reader.readAsText(f);
  e.target.value='';
  toggleAttachMenu();
}

function renderAttachChips(){

  attachments.url.forEach((a,i)=>chips.push(`<div class="chip">🔗 ${a.url.slice(0,20)}... <span class="chip-del" onclick="attachments.url.splice(${i},1);renderAttachChips()">×</span></div>`));

  document.getElementById('attachChips').innerHTML=chips.join('');
}

async function fetchUrl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url){toast('请输入网址');return;}
  if(!url.startsWith('http')){toast('网址必须以http://或https://开头');return;}
  toast('正在抓取...');
  
  // 尝试多个代理，依次回退
  const proxies=[
    async ()=>{
      const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&charset=utf-8`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.contents) throw new Error('空内容');
      return d.contents;
    },
    async ()=>{
      const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    },
    async ()=>{
      const r=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    }
  ];
  
  let html='',lastErr='';
  for(const proxy of proxies){
    try{ html=await proxy(); break; }
    catch(e){ lastErr=e.message; continue; }
  }
  
  if(!html){ toast('抓取失败（所有代理均不可用）：'+lastErr); return; }
  
  try{
    const div=document.createElement('div');
    div.innerHTML=html;
    // 移除script/style/nav等噪音节点
    div.querySelectorAll('script,style,nav,footer,header,aside,[class*="menu"],[class*="sidebar"]').forEach(el=>el.remove());
    const text=(div.textContent||div.innerText||'').replace(/\s+/g,' ').trim().slice(0,12000);
    if(!text||text.length<50) throw new Error('抓取内容为空或过短');
    attachments.url.push({url,content:text});
    renderAttachChips();
    toast(`✅ 网页已抓取（${text.length} 字符）`);
    closeUrlModal();
  }catch(e){toast('解析失败：'+e.message);}
}

// AI写入便签（在AI回复中检测"记住："指令）
function parseAIMemoryCommands(text){
  // 匹配格式：【记忆】标题：内容 或 记住：内容 或 [记忆]内容
  const patterns=[
    /【记忆[：:]?\s*(.+?)】[：:]\s*(.+)/g,
    /\[记忆\]\s*(?:(.+?)[：:])?\s*(.+)/g,
    /记住[：:]\s*(?:「(.+?)」[：:])?\s*(.+)/g,
  ];
  let found=false;
  patterns.forEach(re=>{
    let m;
    while((m=re.exec(text))!==null){
      const title=m[1]?m[1].trim():'AI记录';
      const body=m[2]?m[2].trim():m[1]?m[1].trim():'';
      if(body){
        memoryNotes.unshift({id:Date.now()+Math.random(),title,body,time:Date.now()});
        found=true;
      }
    }
  });
  if(found){saveMemory();toast('✅ AI已更新记忆便签');}
}

async function aiOrganizeMemory(){
  if(!currentAPIId){toast('请先配置API');return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先完善API配置');return;}
  
  const memoryText=memoryNotes.map(n=>`【${n.title}】\n${n.body}`).join('\n\n');
  toast('AI正在整理记忆...');
  
  try{
    const res=await fetch(`${api.url}/chat/completions`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${api.key}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:api.model,
        messages:[{
          role:'user',
          content:`请帮我整理以下记忆便签，合并重复内容，补充缺失信息，优化结构。
          
要求：
1. 只返回JSON数组，格式为[{"title":"标题","body":"内容"}]
2. 不要用markdown代码块包裹，直接返回数组
3. 保持简洁易读

现有便签：
${memoryText}`
        }],
        max_tokens:2048
      })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    let reply=data.choices[0].message.content.trim();
    reply=reply.replace(/^```[\w]*\s*/,'').replace(/\s*```$/,'').trim();
    const arrMatch=reply.match(/(\[[\s\S]*\])/);
    if(arrMatch) reply=arrMatch[1];
    
    const organized=JSON.parse(reply);
    if(Array.isArray(organized)){
      memoryNotes=organized.map(n=>({...n,id:Date.now()+Math.random(),time:Date.now()}));
      saveMemory();
      renderMemoryNotes();
      toast('AI整理完成');
    }else{
      throw new Error('返回格式错误');
    }
  }catch(e){
    console.error('整理失败：',e);
    toast('整理失败：'+e.message);
  }
}

async function doIPLocation(showToast){
  const btn=document.getElementById('locationBtnText');
  
  // 服务1: ip-api.com
  try{
    const res=await fetch('https://ip-api.com/json/?lang=zh-CN&fields=status,country,regionName,city,district,lat,lon,query',{signal:AbortSignal.timeout(5000)});
    const d=await res.json();
    if(d.status==='success'){
      const parts=[d.country,d.regionName,d.city,d.district].filter(Boolean);
      userLocation={
        lat:d.lat, lng:d.lon,
        address:parts.join(' '),
        city:d.city||d.regionName||d.country,
        ip:d.query,
        time:Date.now()
      };
      localStorage.setItem('aiUserLocation',JSON.stringify(userLocation));
      btn.textContent='📍 '+(userLocation.city||'已定位');
      if(showToast) toast(`✅ 定位成功：${userLocation.address}（IP: ${d.query}）`);
      return true;
    }
  }catch(e){}
  
  // 服务2: ipinfo.io
  try{
    const res=await fetch('https://ipinfo.io/json',{signal:AbortSignal.timeout(5000)});
    const d=await res.json();
    if(d.city){
      const parts=[d.country,d.region,d.city].filter(Boolean);
      userLocation={
        lat:parseFloat(d.loc?.split(',')[0]||0),
        lng:parseFloat(d.loc?.split(',')[1]||0),
        address:parts.join(' '),
        city:d.city||d.region,
        ip:d.ip,
        time:Date.now()
      };
      localStorage.setItem('aiUserLocation',JSON.stringify(userLocation));
      btn.textContent='📍 '+(userLocation.city||'已定位');
      if(showToast) toast(`✅ 定位成功：${userLocation.address}`);
      return true;
    }
  }catch(e){}

  return false;
}

function parseAITransfer(text){
  // 检测AI转账指令：转账给你X小克币 / 给你转X小克币 / 转给你X克币
  const patterns=[
    /转账给你\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /给你转\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /转给你\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /向你转账\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
  ];
  for(const re of patterns){
    const m=text.match(re);
    if(m){
      const amount=parseFloat(m[1]);
      if(amount>0&&wallet.balance>=amount){
        wallet.balance=Math.round((wallet.balance-amount)*100)/100;
        saveWallet();
        renderWallet();
        toast(`💰 收到AI转账 ${amount} 小克币！钱包余额：${wallet.balance}`);
        return;
      } else if(amount>wallet.balance){
        toast(`💸 AI余额不足，无法完成转账`);
        return;
      }
    }
  }
}

function importData(){
  // 手机端自动关闭侧边栏
  if(window.innerWidth<=768) closeSidebar();
  
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const importData=JSON.parse(ev.target.result);
        
        // 验证数据格式
        if(!importData.version){
          throw new Error('文件格式不正确');
        }
        
        // 询问导入方式
        const mode=confirm('点击"确定"合并导入（保留现有数据）\n点击"取消"覆盖导入（清空现有数据）');
        
        if(mode){
          // 合并模式
          if(importData.chats){
            importData.chats.forEach(chat=>{
              if(!chats.find(c=>c.id===chat.id)){
                chats.push(chat);
              }
            });
          }
          if(importData.memoryTables){
            importData.memoryTables.forEach(table=>{
              if(!memoryTables.find(t=>t.name===table.name)){
                memoryTables.push(table);
              }
            });
          }
          if(importData.apiConfigs){
            importData.apiConfigs.forEach(api=>{
              if(!apiConfigs.find(a=>a.id===api.id)){
                apiConfigs.push(api);
              }
            });
          }
          toast('已合并导入备份');
        } else {
          // 覆盖模式
          if(importData.chats) chats=importData.chats;
          if(importData.memoryTables) memoryTables=importData.memoryTables;
          if(importData.apiConfigs) apiConfigs=importData.apiConfigs;
          if(importData.currentAPIId) currentAPIId=importData.currentAPIId;
          if(importData.config) config=importData.config;
          if(importData.avatars) avatars=importData.avatars;
          toast('已覆盖导入备份');
        }
        
        // 保存到localStorage
        saveChats();
        saveMemory();
        saveAPIConfigs();
        saveConfig();
        saveAvatars();
        
        // 刷新界面
        renderChatList();
        renderAPIList();
        updateAvatarPreviews();
        
        if(chats.length>0){
          switchChat(chats[0].id);
        }
        
      }catch(err){
        console.error('导入失败：',err);
        toast('导入失败：'+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

  try {
    const c = localStorage.getItem('shortcutConfig2');
    if (c) shortcutConfig = { ...shortcutConfig, ...JSON.parse(c) };
    const h = localStorage.getItem('appUsageHistory2');
    if (h) appUsageHistory = JSON.parse(h);
    const p = localStorage.getItem('pendingActivities');
    if (p) _pendingActivities = JSON.parse(p);
  } catch(e) {}
}
function saveShortcutConfig() {
  localStorage.setItem('shortcutConfig2', JSON.stringify(shortcutConfig));
}
function saveAppUsageHistory() {
  if (appUsageHistory.length > 200) appUsageHistory = appUsageHistory.slice(-200);
  localStorage.setItem('appUsageHistory2', JSON.stringify(appUsageHistory));
  localStorage.setItem('pendingActivities', JSON.stringify(_pendingActivities));
}

// ---- 核心：记录一条活动 ----
// 只记录，不打扰，不跳转，不发消息
function recordActivity(appName, timestamp, source) {
  const ts = parseInt(timestamp) || Date.now();
  // 去重：同一个App 30秒内不重复记录
  const recent = appUsageHistory.find(r => r.appName === appName && ts - r.timestamp < 30000);
  if (recent) return;

  const record = { appName, timestamp: ts, source: source || 'url', shown: false };
  appUsageHistory.push(record);
  _pendingActivities.push(record);
  saveAppUsageHistory();

  // 在当前对话聊天流中插入分隔线
  insertActivityDivider(appName, ts);

  console.log('[活动记录]', appName, new Date(ts).toLocaleTimeString('zh-CN'));
}

// ---- 在聊天流中插入小字分隔线 ----
function insertActivityDivider(appName, timestamp) {
  const box = document.getElementById('messages');
  if (!box) return;
  const timeStr = new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'activity-divider';
  div.dataset.ts = timestamp;
  div.innerHTML = `<span>— 在${appName} · ${timeStr} —</span>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  // 同时记录到当前chat（type=activity，不参与API调用）
  const chat = chats.find(c => c.id === currentChatId);
  if (chat) {
    chat.messages.push({ role: 'activity', appName, timestamp, content: appName });
    saveChats();
  }
}

// ---- 处理URL Scheme（快捷指令直接打开网页时）----
// 现在不再强制跳转！快捷指令改成调服务器接口，这里只作备用
function handleURLScheme() {
  const hash = window.location.hash;
  if (!hash || hash === '#') return;
  try {
    const params = new URLSearchParams(hash.substring(1));
    const appName = params.get('app');
    const ts = params.get('time') || Date.now();
    if (!appName) return;
    recordActivity(appName, ts, 'url');
    // 立即清除hash，不让页面感知到跳转
    history.replaceState(null, '', window.location.pathname + window.location.search);
  } catch(e) {}
}

// ---- 服务器轮询（推荐方式：快捷指令→服务器→网页轮询）----
// 服务器接口约定：GET /events?since=<timestamp>
// 返回：[{ appName, timestamp }]
async function pollServer() {
  if (!shortcutConfig.serverUrl) return;
  try {
    const base = shortcutConfig.serverUrl.replace(/\/$/, '').replace(/\/api\/log$/, '');
    const url = base + `/api/events?since=${_lastPollTime}&_=${Date.now()}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return;
    const events = await res.json();
    if (Array.isArray(events) && events.length > 0) {
      events.forEach(e => {
        if (e.appName) recordActivity(e.appName, e.timestamp || Date.now(), 'server');
      });
      _lastPollTime = Date.now();
    }
  } catch(e) {
    // 网络错误静默处理
  }
}

function startPolling() {
  stopPolling();
  if (!shortcutConfig.enabled || !shortcutConfig.serverUrl || shortcutConfig.pollInterval <= 0) return;
  _pollTimer = setInterval(pollServer, shortcutConfig.pollInterval * 1000);
  pollServer(); // 立即执行一次
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ---- 当用户回到网页，触发AI对pending活动的感知回复 ----
// 不是用户发消息，而是AI主动在对话里留言
let _awarenessRunning = false;
async function triggerAIAwareness() {
  if (!shortcutConfig.aiAutoReply) return;
  if (_pendingActivities.length === 0) return;
  // 防止与正在进行的用户发消息并发
  if (document.getElementById('sendBtn')?.disabled) return;
  if (_awarenessRunning) return;
  _awarenessRunning = true;

  const pending = [..._pendingActivities];
  _pendingActivities = [];
  saveAppUsageHistory();

  // 检查是否有API配置
  const api = apiConfigs.find(a => a.id === currentAPIId) || apiConfigs[0];
  if (!api || !api.key) return;

  // 构建活动摘要给AI
  const summary = pending.map(r => {
    const t = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return `${t} 在用「${r.appName}」`;
  }).join('、');

  const systemNote = `[系统通知] 用户在离开聊天窗口期间的手机使用记录：${summary}。
你现在可以基于这些信息，用你自己的风格自然地发一条消息——不用说"我检测到"之类的机械语气，就像你一直在陪着ta、注意到ta在做什么一样。可以很简短。`;

  // 获取最近几条对话作为上下文
  const chat = chats.find(c => c.id === currentChatId);
  if (!chat) return;

  const recentMsgs = chat.messages
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-6)
    .map(m => ({
      role: m.role === 'assistant' ? 'assistant' : 'user',
      content: typeof m.content === 'string' ? m.content : (m.content?.text || m.content?.content || JSON.stringify(m.content))
    }));

  // 加载记忆
  const memoryP = typeof buildMemoryPrompt === 'function' ? buildMemoryPrompt() : '';
  const timeInfo = `当前时间：${new Date().toLocaleString('zh-CN')}`;

  try {
    const res = await fetch(`${api.url}/chat/completions`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${api.key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: api.model,
        messages: [
          { role: 'system', content: `${timeInfo}\n${memoryP}\n\n${systemNote}` },
          ...recentMsgs
        ],
        max_tokens: 300,
        stream: false
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (!text) return;

    // 显示为AI主动消息
    const box = document.getElementById('messages');
    const avatarStyle = avatars.ai ? `background-image:url(${avatars.ai});background-size:cover;background-position:center` : '';
    const now = Date.now();
    const timeStr = new Date(now).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    const msgEl = document.createElement('div');
    msgEl.className = 'msg ai ai-activity';
    msgEl.innerHTML = `
      <div class="msg-avatar" style="${avatarStyle}">${avatars.ai ? '' : 'A'}</div>
      <div class="msg-content">
        <div class="msg-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${timeStr}</div>
      </div>`;
    box.appendChild(msgEl);
    box.scrollTop = box.scrollHeight;

    // 存入对话历史
    chat.messages.push({ role: 'assistant', content: text, timestamp: now, isAwareness: true });
    saveChats();

  } catch(e) {
    console.log('[感知回复] 请求失败', e.message);
  } finally {
    _awarenessRunning = false;
  }
}

// ---- 页面可见性变化：用户回到网页时触发 ----
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _pendingActivities.length > 0) {
    // 稍等1秒再触发，让页面先稳定
    setTimeout(triggerAIAwareness, 1000);
  }
});

// ---- 设置弹窗 ----
function showShortcutSettings() {
  // 手机端先关闭侧边栏，避免被挡住
  if(window.innerWidth<=768) closeSidebar();
  const modal = document.createElement('div');
  modal.className = 'modal show';
  modal.innerHTML = `
    <div class="modal-content" style="max-width:560px">
      <div class="modal-header">手机感知</div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto">

        <div style="background:#f0f7ff;border:2px solid #b8d4f1;border-radius:14px;padding:16px;margin-bottom:20px;font-size:13px;line-height:1.9;color:#555">
          <strong style="color:#3a7bd5">✦ 新方案：完全不打扰</strong><br>
          快捷指令 → 中间服务器（你自己搭） → 网页轮询<br>
          App活动以 <span style="color:#b8a89a;font-size:12px">— 在XX · 00:00 —</span> 小字显示在聊天流里<br>
          你回到网页时AI会自然地发一条感知消息，不会打断你用App。
          <hr style="border:none;border-top:1px dashed #cce0f5;margin:10px 0">
          <strong>快捷指令设置方法：</strong><br>
          自动化触发 → 发送HTTP请求到你的服务器<br>
          <code style="background:#e8f2ff;padding:2px 6px;border-radius:4px;font-size:11px">POST /event  {"appName":"小红书","timestamp":时间戳}</code><br>
          服务器提供 <code style="background:#e8f2ff;padding:2px 6px;border-radius:4px;font-size:11px">GET /events?since=时间戳</code> 接口供网页轮询
        </div>

        <div class="form-group">
          <label class="form-label">中间服务器地址</label>
          <input class="form-input" id="cfgServerUrl" value="${shortcutConfig.serverUrl}" placeholder="https://your-server.com（留空则只用URL接收）">
          <div class="form-hint">填写后网页会定期轮询服务器获取App活动，无需打开网页也能记录</div>
        </div>

        <div class="form-group">
          <label class="form-label">轮询间隔（秒）</label>
          <input class="form-input" id="cfgPollInterval" type="number" min="5" max="300" value="${shortcutConfig.pollInterval}" placeholder="30">
          <div class="form-hint">建议30~60秒，设为0则不轮询</div>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="cfgAiAutoReply" ${shortcutConfig.aiAutoReply ? 'checked' : ''} style="width:18px;height:18px">
            回到网页时AI自动发感知消息
          </label>
          <div class="form-hint">你有新的App活动且回到网页后，AI会主动说一句话（不占用你的发送操作）</div>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="cfgEnabled" ${shortcutConfig.enabled ? 'checked' : ''} style="width:18px;height:18px">
            启用功能
          </label>
        </div>

        <hr style="margin:16px 0;border:none;border-top:2px dashed #eee">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <strong style="font-size:13px">最近活动记录</strong>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="
            if(confirm('清空所有活动记录？')){appUsageHistory=[];_pendingActivities=[];saveAppUsageHistory();this.closest('.modal').remove();showShortcutSettings();}
          ">清空</button>
        </div>
        <div style="max-height:180px;overflow-y:auto">
          ${appUsageHistory.length === 0
            ? '<div style="text-align:center;color:#bbb;padding:16px;font-size:13px">暂无记录</div>'
            : appUsageHistory.slice(-15).reverse().map(r => {
                const t = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
                const d = new Date(r.timestamp).toLocaleDateString('zh-CN', { month:'2-digit', day:'2-digit' });
                return `<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed #f0e8e0;font-size:13px">
                  <span style="color:#b8a89a;font-size:12px">${d} ${t}</span>
                  <span>在用「${r.appName}」</span>
                  <span style="color:#ccc;font-size:11px;margin-left:auto">${r.source||'url'}</span>
                </div>`;
              }).join('')
          }
        </div>

        <hr style="margin:16px 0;border:none;border-top:2px dashed #eee">
        <button class="btn btn-secondary" style="width:100%" onclick="
          const apps=['小红书','微信','抖音','淘宝','和朋友聊天'];
          const a=apps[Math.floor(Math.random()*apps.length)];
          recordActivity(a, Date.now(), 'test');
          toast('🧪 模拟活动：在用「'+a+'」');
        ">🧪 模拟一条活动（测试分隔线效果）</button>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">取消</button>
        <button class="btn btn-primary" onclick="
          shortcutConfig.serverUrl = document.getElementById('cfgServerUrl').value.trim();
          shortcutConfig.pollInterval = parseInt(document.getElementById('cfgPollInterval').value)||30;
          shortcutConfig.aiAutoReply = document.getElementById('cfgAiAutoReply').checked;
          shortcutConfig.enabled = document.getElementById('cfgEnabled').checked;
          saveShortcutConfig();
          startPolling();
          toast('✅ 设置已保存');
          this.closest('.modal').remove();
        ">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

// ---- 初始化 ----
(function() {
  loadShortcutConfig();

  // 处理URL Scheme（备用，快捷指令偶尔直接打开URL时）
  handleURLScheme();
  window.addEventListener('hashchange', handleURLScheme);

  // 启动服务器轮询
  startPolling();

  // 添加侧边栏按钮
  setTimeout(() => {
    const footer = document.querySelector('.sidebar-footer');
    if (footer) {
      const btn = document.createElement('button');
      btn.className = 'sidebar-btn';
      btn.innerHTML = '<span>手机感知</span>';
      btn.onclick = showShortcutSettings;
      if (footer.firstChild) footer.insertBefore(btn, footer.firstChild);
      else footer.appendChild(btn);
    }
  }, 1000);

  // 页面加载时，如果有pending活动也触发一次
  setTimeout(() => {
    if (_pendingActivities.length > 0) triggerAIAwareness();
  }, 2000);

  console.log('[手机感知] 已初始化，pending活动:', _pendingActivities.length);
})();
</script>
