<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>AI 对话助手</title>
<style>
/* 主题配置 */
:root {
  --主色调: #c8c8c8;
  --次色调: #888888;
  --强调色: #e0e0e0;
  --背景色: #111111;
  --卡片背景: #1a1a1a;
  --文字颜色: #d8d8d8;
  --浅色文字: #666666;
  --边框颜色: #2a2a2a;
  --圆角: 12px;
  --大圆角: 14px;
  --阴影: 0 2px 16px rgba(0,0,0,0.4);
  --字体: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

* {margin: 0;padding: 0;box-sizing: border-box;}

body {
  font-family: var(--字体);
  background: var(--背景色);
  color: var(--文字颜色);
  height: 100vh;
  overflow: hidden;
  display: flex;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;left: 0;right: 0;bottom: 0;
  background-image: 
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.02) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(255,255,255,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body > * {position: relative;z-index: 1;}

/* 侧边栏 */
.sidebar {
  width: 260px;
  background: #141414;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--边框颜色);
  position: relative;
  box-shadow: 1px 0 24px rgba(0,0,0,0.5);
}

.sidebar::before {
  display: none;
}

.sidebar-header {padding: 30px 16px 16px;}

.new-chat-btn {
  width: 100%;padding: 12px;
  background: transparent;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  color: var(--文字颜色);
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.new-chat-btn::before {content: '';}

.new-chat-btn:hover {
  background: var(--边框颜色);
  border-color: #3a3a3a;
}

.chat-list {flex: 1;overflow-y: auto;padding: 12px;}

.chat-list::-webkit-scrollbar {width: 4px;}
.chat-list::-webkit-scrollbar-thumb {
  background: #2e2e2e;
  border-radius: 10px;
}

.chat-item {
  padding: 10px 12px;
  border-radius: var(--圆角);
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}

.chat-item::before {content: '';}

.chat-item:hover {
  background: #1e1e1e;
  border-color: transparent;
  transform: none;
  box-shadow: none;
}

.chat-item.active {
  background: #202020;
  border-color: var(--边框颜色);
  box-shadow: none;
}

.chat-item-title {
  flex: 1;
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 标题编辑 */
.chat-item-title input {
  background: transparent;
  border: none;
  width: 100%;
  font-size: 14px;
  outline: none;
  color: var(--文字颜色);
}

.chat-item-title input:focus {
  background: #2a2a2a;
  padding: 2px 6px;
  border-radius: 6px;
}

.chat-item-del {
  opacity: 0;
  color: var(--浅色文字);
  font-size: 18px;
  transition: all 0.2s;
}

.chat-item:hover .chat-item-del {opacity: 1;}
.chat-item-del:hover {color: #aaaaaa;transform: scale(1.1);}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--边框颜色);
  margin-bottom: 20px;
}

.sidebar-btn {
  width: 100%;padding: 11px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--圆角);
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--次色调);
}

.sidebar-btn:hover {
  background: #1e1e1e;
  color: var(--文字颜色);
  border-color: transparent;
  transform: none;
  box-shadow: none;
}

/* 主聊天区 */
.main {flex: 1;display: flex;flex-direction: column;background: var(--背景色);}

.chat-header {
  padding: 16px 24px;
  background: #141414;
  border-bottom: 1px solid var(--边框颜色);
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(10px);
  box-shadow: none;
}

.chat-title {
  font-size: 16px;
  font-weight: 400;
  color: var(--文字颜色);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.03em;
}

.chat-title::before {content: '';}

/* 头像上传 */
.avatar-upload {
  position: relative;
  cursor: pointer;
}

.avatar-upload input {display: none;}

.avatar-upload:hover::after {
  content: '更换';
  position: absolute;
  top: 0;left: 0;right: 0;bottom: 0;
  background: rgba(0,0,0,0.7);
  color: #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  border-radius: 50%;
}

.header-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  cursor: pointer;
  font-size: 13px;
  color: var(--次色调);
  transition: all 0.2s;
  font-weight: 400;
  letter-spacing: 0.02em;
}

.header-btn:hover {
  background: #2a2a2a;
  color: var(--文字颜色);
  border-color: #3a3a3a;
  transform: scale(1.05);
}

/* 消息区域 */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.messages::-webkit-scrollbar {width: 4px;}
.messages::-webkit-scrollbar-track {
  background: transparent;
  border-radius: 10px;
}
.messages::-webkit-scrollbar-thumb {
  background: #2e2e2e;
  border-radius: 10px;
  border: none;
}

.msg {
  display: flex;
  gap: 14px;
  max-width: 75%;
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from {opacity: 0;transform: translateY(15px);}
  to {opacity: 1;transform: translateY(0);}
}

.msg.user {margin-left: auto;flex-direction: row-reverse;}

/* 头像 */
.msg-avatar {
  width: 36px;height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 400;
  flex-shrink: 0;
  border: 1px solid var(--边框颜色);
  box-shadow: none;
  background-size: cover;
  background-position: center;
}

.msg.user .msg-avatar {
  background: #222222;
  color: var(--次色调);
}

.msg.ai .msg-avatar {
  background: #1a1a1a;
  color: var(--次色调);
}

/* 消息内容 */
.msg-content {flex: 1;min-width: 0;overflow: hidden;}

.msg-text {
  line-height: 1.9;
  font-size: 15px;
  word-break: break-word;
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

.msg.user .msg-text {
  background: #222222;
  color: #d8d8d8;
  padding: 12px 16px;
  border-radius: var(--大圆角);
  border-bottom-right-radius: 4px;
  box-shadow: none;
  border: 1px solid #2e2e2e;
  font-size: 14px;
}

.msg.ai .msg-text {
  background: #1a1a1a;
  color: var(--文字颜色);
  padding: 12px 16px;
  border-radius: var(--大圆角);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--边框颜色);
  box-shadow: none;
  max-width: 100%;
  overflow-x: hidden;
  word-break: break-word;
  overflow-wrap: break-word;
  font-size: 14px;
}

/* 时间戳 */
.msg-time {
  font-size: 11px;
  color: var(--浅色文字);
  margin-top: 6px;
}

/* AI消息操作按钮 */
.msg-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  opacity: 0;
  transition: opacity 0.3s;
}

.msg.ai:hover .msg-actions {opacity: 1;}

.msg-action-btn {
  padding: 5px 10px;
  background: #1e1e1e;
  border: 1px solid var(--边框颜色);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--次色调);
  display: flex;
  align-items: center;
  gap: 4px;
}

.msg-action-btn:hover {
  background: #2a2a2a;
  color: var(--文字颜色);
  border-color: #3a3a3a;
  transform: none;
}

/* 思维链 */
.thinking-block {
  margin-bottom: 10px;
  background: #161616;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  overflow: hidden;
}

.thinking-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 12px;
  color: var(--次色调);
  user-select: none;
  transition: all 0.2s;
}

.thinking-toggle:hover {background: #1e1e1e;}

.thinking-toggle .t-icon {
  transition: transform .2s;
  font-size: 11px;
}

.thinking-toggle.open .t-icon {transform: rotate(90deg);}

.thinking-content {
  display: none;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--浅色文字);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  border-top: 1px solid var(--边框颜色);
  background: #141414;
}

.thinking-content.show {display: block;}

/* 代码块 */
.code-block {
  background: #0e0e0e;
  border-radius: var(--圆角);
  overflow: hidden;
  margin: 12px 0;
  border: 1px solid #2a2a2a;
  box-shadow: none;
  max-width: 100%;
  box-sizing: border-box;
}

.code-header {
  background: #161616;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #2a2a2a;
}

.code-lang {font-size: 12px;color: #555555;font-weight: 400;letter-spacing: 0.05em;}

.code-copy {
  background: transparent;
  color: var(--次色调);
  border: 1px solid #2e2e2e;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 400;
}

.code-copy:hover {
  background: #2a2a2a;
  color: var(--文字颜色);
  transform: none;
}

.code-copy.copied {background: #1e2e1e;color: #6a9e6a;border-color: #3a5a3a;}

.code-body {padding: 18px;overflow-x: auto;background: #1e1e1e;max-width: 100%;}

.code-body pre {
  margin: 0;
  color: #d4d4d4;
  font-family: 'Consolas', monospace;
  line-height: 1.7;
  font-size: 13px;
  white-space: pre;
  word-break: normal;
  overflow-wrap: normal;
}

/* 文件卡片 */
.file-card {
  background: #1a1a1a;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  padding: 14px 16px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: none;
  transition: all 0.2s;
}

.file-card:hover {
  transform: none;
  background: #1e1e1e;
  box-shadow: none;
}

.file-icon {font-size: 24px;filter: grayscale(1);opacity: 0.7;}

.file-info {flex: 1;}

.file-name {font-size: 14px;font-weight: 400;color: var(--文字颜色);}
.file-size {font-size: 12px;color: var(--浅色文字);margin-top: 4px;}

.file-btn {
  padding: 8px 16px;
  background: transparent;
  color: var(--次色调);
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  transition: all 0.2s;
}

.file-btn:hover {
  background: #2a2a2a;
  color: var(--文字颜色);
  transform: none;
  box-shadow: none;
}

/* 底部输入区 */
.input-area {
  padding: 16px 20px;
  background: #141414;
  border-top: 1px solid var(--边框颜色);
  backdrop-filter: blur(10px);
}

.attach-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.attach-chips:empty {display: none;}

.chip {
  background: #1e1e1e;
  border: 1px solid var(--边框颜色);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: none;
  color: var(--次色调);
}

.chip-del {
  cursor: pointer;
  color: #444;
  font-weight: 400;
  transition: all 0.2s;
}

.chip-del:hover {color: #aaaaaa;transform: none;}

.input-box {display: flex;align-items: flex-end;gap: 10px;}

.attach-btn {
  width: 42px;height: 42px;
  background: transparent;
  border: 1px solid var(--边框颜色);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
  box-shadow: none;
  color: var(--次色调);
}

.attach-btn:hover {
  background: #1e1e1e;
  color: var(--文字颜色);
  transform: none;
  box-shadow: none;
}

.input-wrap {flex: 1;position: relative;}

textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--边框颜色);
  border-radius: var(--大圆角);
  font-size: 14px;
  font-family: var(--字体);
  resize: none;
  outline: none;
  background: #1a1a1a;
  color: var(--文字颜色);
  box-shadow: none;
  transition: border-color 0.2s;
}

textarea::placeholder {color: #444444;}

textarea:focus {
  border-color: #3a3a3a;
  box-shadow: none;
}

.send-btn {
  width: 42px;height: 42px;
  background: #222222;
  color: var(--次色调);
  border: 1px solid var(--边框颜色);
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
  box-shadow: none;
  font-weight: 400;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send-btn:hover {
  background: #2a2a2a;
  color: var(--文字颜色);
  transform: none;
  box-shadow: none;
}

.send-btn:disabled {opacity: 0.3;cursor: not-allowed;}

/* 附件菜单 */
.attach-menu {
  position: absolute;
  bottom: 56px;
  left: 0;
  background: #1a1a1a;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: none;
  min-width: 200px;
  overflow: hidden;
  z-index: 100;
}

.attach-menu.show {display: block;animation: popIn 0.2s ease;}

@keyframes popIn {
  from {opacity: 0;transform: translateY(8px);}
  to {opacity: 1;transform: translateY(0);}
}

.attach-menu-item {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--边框颜色);
  transition: all 0.2s;
  color: var(--次色调);
}

.attach-menu-item:last-child {border: none;}

.attach-menu-item:hover {
  background: #222222;
  color: var(--文字颜色);
  transform: none;
}

.attach-menu-item input {display: none;}

/* 弹窗 */
.modal {
  display: none;
  position: fixed;
  top: 0;left: 0;right: 0;bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.modal.show {display: flex;animation: fadeIn 0.2s;}

@keyframes fadeIn {from {opacity: 0} to {opacity: 1}}

.modal-content {
  background: #161616;
  border-radius: var(--大圆角);
  width: 90%;
  max-width: 640px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--边框颜色);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from {opacity: 0;transform: translateY(20px);}
  to {opacity: 1;transform: translateY(0);}
}

.modal-header {
  padding: 20px 24px;
  background: #1a1a1a;
  color: var(--文字颜色);
  font-size: 15px;
  font-weight: 400;
  border-bottom: 1px solid var(--边框颜色);
  letter-spacing: 0.04em;
}

.modal-body {flex: 1;overflow-y: auto;padding: 24px;}

.modal-body::-webkit-scrollbar {width: 4px;}
.modal-body::-webkit-scrollbar-thumb {
  background: #2e2e2e;
  border-radius: 10px;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--边框颜色);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  background: #161616;
}

/* 按钮 */
.btn {
  padding: 10px 20px;
  border-radius: var(--圆角);
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  border: 1px solid var(--边框颜色);
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.btn-primary {
  background: #222222;
  color: var(--文字颜色);
  border-color: #3a3a3a;
}

.btn-primary:hover {
  background: #2e2e2e;
  transform: none;
  box-shadow: none;
}

.btn-secondary {
  background: transparent;
  color: var(--次色调);
  border-color: var(--边框颜色);
}

.btn-secondary:hover {
  background: #1e1e1e;
  color: var(--文字颜色);
  border-color: #3a3a3a;
}

/* 表单 */
.form-group {margin-bottom: 18px;}

.form-label {
  font-size: 12px;
  font-weight: 400;
  color: var(--次色调);
  margin-bottom: 8px;
  display: block;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.form-input,.form-select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  font-size: 13px;
  font-family: var(--字体);
  background: #1a1a1a;
  color: var(--文字颜色);
  transition: border-color 0.2s;
}

.form-input:focus,.form-select:focus {
  outline: none;
  border-color: #3a3a3a;
  box-shadow: none;
}

.form-hint {font-size: 11px;color: var(--浅色文字);margin-top: 5px;}

/* API存储列表 */
.api-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.api-item {
  padding: 11px 14px;
  background: #1a1a1a;
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.api-item:hover {
  background: #1e1e1e;
  border-color: #3a3a3a;
}

.api-item.active {
  background: #202020;
  border-color: #3a3a3a;
  box-shadow: none;
}

.api-item-info {flex: 1;min-width: 0;}

.api-item-name {font-weight: 400;font-size: 13px;}
.api-item-model {font-size: 11px;color: var(--浅色文字);margin-top: 2px;}

.api-item-del {
  color: #333;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.api-item-del:hover {color: #888888;transform: none;}

/* 记忆表格 */
.memory-tables {display: flex;flex-direction: column;gap: 14px;}

.memory-table {
  border: 1px solid var(--边框颜色);
  border-radius: var(--圆角);
  overflow: hidden;
  background: #1a1a1a;
  box-shadow: none;
}

.table-header {
  background: #1e1e1e;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--边框颜色);
}

.table-title {font-weight: 400;font-size: 13px;color: var(--次色调);letter-spacing: 0.04em;}

.table-title input {
  background: transparent;
  border: none;
  color: var(--次色调);
  font-weight: 400;
  font-size: 13px;
  outline: none;
  border-bottom: 1px solid #3a3a3a;
}

.table-actions {display: flex;gap: 8px;}

.icon-btn {

<script>
// ========== 全局状态 ==========
let apiConfigs=[];  // API配置列表
let currentAPIId=null;  // 当前使用的API ID
let config={imgUrl:'',imgKey:'',neteaseToken:''};  // 其他配置
let chats=[];
let currentChatId=null;
let memoryTables=[];
let memoryNotes=[];  // 便签记忆
let attachments={img:[],file:[],url:[],music:[]};
let avatars={user:'',ai:''};  // 头像URLs
let editingMessageIndex=null;  // 正在编辑的消息索引
// 图片内存缓存：msgId -> [{dataUrl}]  不存入localStorage
const imgCache={};
// 小克币钱包
let wallet={balance:100};
// 用户位置信息
let userLocation=null;
// 上一条消息的时间戳（用于计算回复间隔）
let lastMessageTime=null;

// ========== 初始化 ==========
window.onload=()=>{
  loadAPIConfigs();
  loadConfig();
  loadChats();
  loadMemory();
  loadAvatars();
  loadWallet();
  loadLocation();
  // 自动IP定位（静默，不弹提示）
  autoDetectIP();
  if(chats.length===0){newChat();}else{switchChat(chats[0].id);}
  renderChatList();
  renderAPIList();
  updateTime();
  setInterval(updateTime,1000);
  // 页面关闭/刷新前强制保存，减少记录丢失
  window.addEventListener('beforeunload', () => { try { saveChats(); } catch(e){} });
  
  document.addEventListener('click',e=>{
    const menu=document.getElementById('attachMenu');
    const btn=document.querySelector('.attach-btn');
    if(!menu.contains(e.target)&&e.target!==btn){menu.classList.remove('show');}
  });
  loadBackground();
  loadDiaries();
  // 每天第一次打开时触发AI写日记（异步，不影响启动）
  setTimeout(triggerAIDiary, 5000);
};

// ========== 时间显示 ==========
function updateTime(){
  const now=new Date();
  const timeStr=now.toLocaleString('zh-CN',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    hour12:false
  });
  document.getElementById('currentTime').textContent=timeStr;
}

// ========== 头像管理 ==========
function loadAvatars(){
  const saved=localStorage.getItem('aiAvatars');
  if(saved) avatars=JSON.parse(saved);
  updateAvatarPreviews();
}

function saveAvatars(){
  localStorage.setItem('aiAvatars',JSON.stringify(avatars));
}

function updateAvatarPreviews(){
  const userPreview=document.getElementById('userAvatarPreview');
  const aiPreview=document.getElementById('aiAvatarPreview');
  if(avatars.user){
    userPreview.style.backgroundImage=`url(${avatars.user})`;
    userPreview.textContent='';
  }
  if(avatars.ai){
    aiPreview.style.backgroundImage=`url(${avatars.ai})`;
    aiPreview.textContent='';
  }
}

function handleUserAvatar(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    avatars.user=ev.target.result;
    saveAvatars();
    updateAvatarPreviews();
    toast('用户头像已更新');
  };
  reader.readAsDataURL(file);
}

function handleAIAvatar(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    avatars.ai=ev.target.result;
    saveAvatars();
    updateAvatarPreviews();
    toast('AI头像已更新');
  };
  reader.readAsDataURL(file);
}

function showAvatarSettings(){
  // 手机端自动关闭侧边栏
  if(window.innerWidth<=768) closeSidebar();
  
  updateAvatarPreviews();
  document.getElementById('avatarModal').classList.add('show');
}

function closeAvatarSettings(){
  document.getElementById('avatarModal').classList.remove('show');
}

// ========== API配置管理 ==========
function loadAPIConfigs(){
  const saved=localStorage.getItem('aiAPIConfigs');
  if(saved) apiConfigs=JSON.parse(saved);
  const savedId=localStorage.getItem('aiCurrentAPIId');
  if(savedId) currentAPIId=savedId;
}

function saveAPIConfigs(){
  localStorage.setItem('aiAPIConfigs',JSON.stringify(apiConfigs));
  if(currentAPIId) localStorage.setItem('aiCurrentAPIId',currentAPIId);
}

function renderAPIList(){
  const list=document.getElementById('apiList');
  if(!apiConfigs.length){
    list.innerHTML='<div style="text-align:center;color:var(--浅色文字);padding:20px">暂无API配置</div>';
    return;
  }
  list.innerHTML=apiConfigs.map(api=>`
    <div class="api-item ${api.id===currentAPIId?'active':''}" onclick="selectAPI('${api.id}')">
      <div class="api-item-info">
        <div class="api-item-name">${api.name||'未命名'}</div>
        <div class="api-item-model">${api.model||'未设置模型'}</div>
      </div>
      <span class="api-item-del" onclick="event.stopPropagation();deleteAPI('${api.id}')">×</span>
    </div>
  `).join('');
}

function selectAPI(id){
  currentAPIId=id;
  const api=apiConfigs.find(a=>a.id===id);
  if(api){
    document.getElementById('apiName').value=api.name||'';
    document.getElementById('apiUrl').value=api.url||'';
    document.getElementById('apiKey').value=api.key||'';
    setModelSelect(api.model||'gpt-4o');
  }
  saveAPIConfigs();
  renderAPIList();
  toast('已切换到：'+(api?.name||'未命名'));
}

function addNewAPI(){
  const id=Date.now().toString();
  apiConfigs.push({id,name:'新API配置',url:'',key:'',model:'gpt-4o'});
  currentAPIId=id;
  saveAPIConfigs();
  renderAPIList();
  selectAPI(id);
}

function deleteAPI(id){
  if(!confirm('确定删除此API配置？'))return;
  apiConfigs=apiConfigs.filter(a=>a.id!==id);
  if(currentAPIId===id){
    currentAPIId=apiConfigs.length>0?apiConfigs[0].id:null;
  }
  saveAPIConfigs();
  renderAPIList();
  if(currentAPIId){
    selectAPI(currentAPIId);
  } else {
    document.getElementById('apiName').value='';
    document.getElementById('apiUrl').value='';
    document.getElementById('apiKey').value='';
    setModelSelect('gpt-4o');
  }
}

function saveCurrentAPI(){
  if(!currentAPIId){
    addNewAPI();
    return;
  }
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api) return;
  
  api.name=document.getElementById('apiName').value||'未命名';
  api.url=document.getElementById('apiUrl').value;
  api.key=document.getElementById('apiKey').value;
  api.model=document.getElementById('model').value;
  
  saveAPIConfigs();
  renderAPIList();
  toast('API配置已保存');
}

function loadConfig(){
  const saved=localStorage.getItem('aiConfig');
  if(saved) config=JSON.parse(saved);
}

function saveConfig(){
  localStorage.setItem('aiConfig',JSON.stringify(config));
}

function showSettings(){
  if(window.innerWidth<=768) closeSidebar();
  if(currentAPIId){
    const api=apiConfigs.find(a=>a.id===currentAPIId);
    if(api){
      document.getElementById('apiName').value=api.name||'';
      document.getElementById('apiUrl').value=api.url||'';
      document.getElementById('apiKey').value=api.key||'';
      setModelSelect(api.model||'gpt-4o');
    }
  }
  document.getElementById('imgUrl').value=config.imgUrl||'';
  document.getElementById('imgKey').value=config.imgKey||'';
  document.getElementById('neteaseToken').value=config.neteaseToken||'';
  renderAPIList();
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings(){
  config.imgUrl=document.getElementById('imgUrl').value;
  config.imgKey=document.getElementById('imgKey').value;
  config.neteaseToken=document.getElementById('neteaseToken').value;
  saveConfig();
  document.getElementById('settingsModal').classList.remove('show');
}

// 设置model下拉框的值，如果选项不存在就自动插入
function setModelSelect(modelId){
  const select=document.getElementById('model');
  // 先尝试直接设置
  select.value=modelId;
  // 如果没选上（值不在选项里），插入一个临时option
  if(select.value!==modelId){
    const opt=document.createElement('option');
    opt.value=modelId;
    opt.textContent=modelId;
    select.insertBefore(opt,select.firstChild);
    select.value=modelId;
  }
}

async function fetchModels(){
  if(!currentAPIId){toast('请先选择或创建API配置');return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先填写API地址和密钥');return;}
  
  // 先保存当前填写的内容（避免切换时丢失）
  api.name=document.getElementById('apiName').value||api.name;
  api.url=document.getElementById('apiUrl').value||api.url;
  api.key=document.getElementById('apiKey').value||api.key;
  
  toast('正在获取模型列表...');
  try{
    const res=await fetch(`${api.url}/models`,{
      headers:{'Authorization':`Bearer ${api.key}`},
      signal:AbortSignal.timeout(10000)
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!data.data||!data.data.length) throw new Error('返回的模型列表为空');
    
    const select=document.getElementById('model');
    const prevModel=api.model||select.value;
    select.innerHTML='';
    data.data
      .sort((a,b)=>a.id.localeCompare(b.id))
      .forEach(m=>{
        const opt=document.createElement('option');
        opt.value=m.id;
        opt.textContent=m.id;
        select.appendChild(opt);
      });
    
    // 恢复该API之前保存的模型，找不到就用列表第一个
    if(prevModel){
      select.value=prevModel;
      if(select.value!==prevModel){
        select.value=data.data[0].id; // 之前的模型不在新列表里，用第一个
      }
    }
    api.model=select.value;
    saveAPIConfigs();
    toast(`已获取 ${data.data.length} 个模型，当前：${select.value}`);
  }catch(e){
    toast('获取失败：'+e.message);
  }
}

// ========== 聊天管理 ==========
function loadChats(){
  const saved=localStorage.getItem('aiChats');
  if(saved) chats=JSON.parse(saved);
}

function _stripImages(messages, maxCount) {
  return messages.slice(-maxCount).map(m => {
    if (m.role === 'user' && Array.isArray(m.content)) {
      return {
        ...m,
        content: m.content.map(p => {
          if (p.type === 'image_url') {
            return {type:'image_url',image_url:{url:'[图片已从存储中移除]'},_imgCacheId:p._imgCacheId};
          }
          return p;
        })
      };
    }
    return m;
  });
}

function saveChats(){
  // 分级存储：先尝试保存200条，失败则降到100条、50条、20条
  const limits = [200, 100, 50, 20];
  for (const limit of limits) {
    try {
      const toSave = chats.map(c => ({...c, messages: _stripImages(c.messages, limit)}));
      const json = JSON.stringify(toSave);
      localStorage.setItem('aiChats', json);
      return; // 成功即退出
    } catch(e) {
      if (limit === 20) {
        // 最后手段：只保存当前对话的最近20条
        try {
          const cur = chats.find(c => c.id === currentChatId);
          if (cur) {
            const minimal = [{...cur, messages: _stripImages(cur.messages, 20)}];
            localStorage.setItem('aiChats', JSON.stringify(minimal));
          }
        } catch(e2) { console.error('[存储] 严重：无法保存任何对话'); }
      }
    }
  }
}

function newChat(){
  const id=Date.now().toString();
  chats.unshift({id,title:'新对话',messages:[],createdAt:Date.now()});
  switchChat(id);
  renderChatList();
  saveChats();
  
  // 手机端自动关闭侧边栏
  if(window.innerWidth<=768) closeSidebar();
}

function switchChat(id){
  currentChatId=id;
  const chat=chats.find(c=>c.id===id);
  if(!chat) return;
  document.getElementById('chatTitle').textContent=chat.title;
  renderMessages(chat.messages);
  renderChatList();
  
  // 手机端自动关闭侧边栏
  if(window.innerWidth<=768) closeSidebar();
}

function renderChatList(){
  const list=document.getElementById('chatList');
  list.innerHTML=chats.map(c=>`
    <div class="chat-item ${c.id===currentChatId?'active':''}" onclick="switchChat('${c.id}')">
      <div class="chat-item-title">
        <input value="${c.title}" onchange="updateChatTitle('${c.id}',this.value)" onclick="event.stopPropagation()">
      </div>
      <span class="chat-item-del" onclick="event.stopPropagation();deleteChat('${c.id}')">×</span>
    </div>
  `).join('');
}

function updateChatTitle(id,title){
  const chat=chats.find(c=>c.id===id);
  if(chat){
    chat.title=title||'新对话';
    saveChats();
    if(id===currentChatId){
      document.getElementById('chatTitle').textContent=chat.title;
    }
  }
}

function deleteChat(id){
  if(!confirm('确定删除此对话？'))return;
  chats=chats.filter(c=>c.id!==id);
  saveChats();
  if(currentChatId===id){
    if(chats.length>0){switchChat(chats[0].id);}
    else{newChat();}
  }
  renderChatList();
}

function clearChat(){
  if(!confirm('确定清空当前对话？'))return;
  const chat=chats.find(c=>c.id===currentChatId);
  if(chat){
    chat.messages=[];
    renderMessages([]);
    saveChats();
  }
}

// ========== 消息渲染 ==========
function renderMessages(messages){
  const box=document.getElementById('messages');
  box.innerHTML='';
  let realIdx=0; // 只计user/assistant的真实轮次，不含activity
  messages.forEach((m,idx)=>{
    if(m.role==='activity'){
      // 活动分隔线
      const ts=m.timestamp||Date.now();
      const timeStr=new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      const div=document.createElement('div');
      div.className='activity-divider';
      div.innerHTML=`<span>— 在${m.appName} · ${timeStr} —</span>`;
      box.appendChild(div);
      return;
    }
    const floor=Math.floor(realIdx/2)+1;
    if(m.role==='user'){
      addUserMessage(m.content,false,m.timestamp,floor,m.intervalMs);
      realIdx++;
    } else if(m.role==='assistant'){
      addAIMessage(m.content,false,m.timestamp,idx,floor,m.elapsed);
      realIdx++;
    }
  });
  box.scrollTop=box.scrollHeight;
}

function addUserMessage(content,scroll=true,timestamp,floorNumber,intervalMs){
  const box=document.getElementById('messages');
  const msg=document.createElement('div');
  msg.className='msg user';
  
  let text='';
  let attachHtml='';
  
  if(typeof content==='string'){text=content;}
  else if(Array.isArray(content)){
    const textPart=content.find(p=>p.type==='text'&&!p._isFile&&!p._isUrl&&!p._isMusic);
    if(textPart) text=textPart.text;
    content.forEach(p=>{
      if(p.type==='image_url'){
        const url=(p._imgCacheId&&imgCache[p._imgCacheId])||p.image_url.url;
        if(url&&url!=='[图片已从存储中移除]'){
          attachHtml+=`<img src="${url}" style="max-width:100%;border-radius:12px;margin-top:10px;border:3px solid white">`;
        } else {
          attachHtml+=`<div class="chip">🖼️ [图片]</div>`;
        }
      }
      if(p._isFile) attachHtml+=`<div class="chip">📄 ${p._name}</div>`;
      if(p._isUrl) attachHtml+=`<div class="chip">🔗 ${p._url}</div>`;
      if(p._isMusic) attachHtml+=`<div class="chip">🎵 ${p._title}</div>`;
    });
  }
  
  const avatarStyle=avatars.user?`background-image:url(${avatars.user});background-size:cover;background-position:center`:'';
  const timeStr=timestamp?formatTime(timestamp):'';
  const floorStr=floorNumber?`#${floorNumber}`:'';
  const intervalStr=intervalMs!=null?`⏱️ 间隔 ${formatInterval(intervalMs)}`:'';
  
  msg.innerHTML=`
    <div class="msg-avatar" style="${avatarStyle}">${avatars.user?'':'U'}</div>
    <div class="msg-content">
      <div class="msg-text">${escapeHtml(text)}</div>
      ${attachHtml}
      <div class="msg-time">${[floorStr,timeStr,intervalStr].filter(Boolean).join(' · ')}</div>
    </div>
  `;
  box.appendChild(msg);
  if(scroll) box.scrollTop=box.scrollHeight;
}

function addAIMessage(content,scroll=true,timestamp,msgIndex,floorNumber,elapsed){
  const box=document.getElementById('messages');
  const msg=document.createElement('div');
  msg.className='msg ai';
  
  const contentDiv=document.createElement('div');
  contentDiv.className='msg-content';
  
  // 思维链处理
  let thinkingHtml='';
  if(content.thinking||content.reasoning_content){
    const thinkText=content.thinking||content.reasoning_content;
    const thinkId='think_'+Date.now();
    thinkingHtml=`
      <div class="thinking-block">
        <div class="thinking-toggle" onclick="toggleThinking('${thinkId}')">
          <span class="t-icon">▶</span>
          <span>💭 思考过程</span>
          <span style="margin-left:auto;font-size:11px;color:var(--浅色文字)">${thinkText.length} 字符</span>
        </div>
        <div class="thinking-content" id="${thinkId}">${escapeHtml(thinkText)}</div>
      </div>
    `;
  }
  
  const actualContent=content.text||content.content||content;
  
  // 文件标记处理
  const fileRegex=/```file:([^\n]+)\n([\s\S]*?)```/g;
  let processed=actualContent;
  
  processed=processed.replace(fileRegex,(match,filename,fileContent)=>{
    const size=new Blob([fileContent]).size;
    const sizeText=size>1024?(size/1024).toFixed(1)+' KB':size+' B';
    const ext=filename.split('.').pop().toLowerCase();
    let icon='📄';
    if(['js','ts','py'].includes(ext)) icon='📜';
    else if(['html','css'].includes(ext)) icon='🌐';
    
    const id='file_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    setTimeout(()=>{
      const btn=document.getElementById(id);
      if(btn){
        btn.onclick=()=>{
          const blob=new Blob([fileContent],{type:'text/plain'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;
          a.download=filename;
          a.click();
          URL.revokeObjectURL(url);
          toast('文件已下载');
        };
      }
    },0);
    
    return `<div class="file-card">
      <div class="file-icon">${icon}</div>
      <div class="file-info">
        <div class="file-name">${filename}</div>
        <div class="file-size">${sizeText}</div>
      </div>
      <button class="file-btn" id="${id}">下载</button>
    </div>`;
  });
  
  // 代码块处理
  const codeRegex=/```(\w+)?\n([\s\S]*?)```/g;
  processed=processed.replace(codeRegex,(match,lang,code)=>{
    const id='code_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    setTimeout(()=>{
      const btn=document.getElementById(id);
      if(btn){
        btn.onclick=()=>{
          navigator.clipboard.writeText(code.trim());
          btn.textContent='已复制';
          btn.classList.add('copied');
          setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied');},2000);
        };
      }
    },0);
    
    return `<div class="code-block">
      <div class="code-header">
        <span class="code-lang">${lang||'code'}</span>
        <button class="code-copy" id="${id}">复制</button>
      </div>
      <div class="code-body"><pre>${escapeHtml(code.trim())}</pre></div>
    </div>`;
  });
  
  // 音乐卡片处理 - 支持多种格式
  // 格式1: 🎵歌曲ID:123456 | 歌名 - 歌手
  // 格式2: 🎵 123456 歌名 歌手
  // 格式3: 歌曲ID: 123456
  const musicPatterns=[
    // 格式1: 🎵歌曲ID:123456 | 歌名 - 歌手
    /🎵\s*歌曲ID[：:]\s*(\d+)\s*\|\s*(.+?)\s*-\s*(.+?)(?=\n|$)/g,
    // 格式2: 歌曲ID: 123456, 歌名: xxx, 歌手: xxx
    /歌曲ID[：:]\s*(\d+)[,，]\s*歌名[：:]\s*(.+?)[,，]\s*歌手[：:]\s*(.+?)(?=\n|$)/g,
    // 格式3: ID:123456 - 歌名(歌手)
    /ID[：:]\s*(\d+)\s*-\s*(.+?)\((.+?)\)/g
  ];
  
  musicPatterns.forEach(pattern=>{
    processed=processed.replace(pattern,(match,songId,title,artist)=>{
      const id='music_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      setTimeout(()=>{
        const btn=document.getElementById(id);
        if(btn){
          btn.onclick=()=>playMusic(songId.trim(),title.trim(),artist.trim());
        }
      },0);
      
      return `<div class="file-card" style="background:linear-gradient(135deg, rgba(147,112,219,0.1), rgba(138,43,226,0.1));">
        <div class="file-icon">🎵</div>
        <div class="file-info">
          <div class="file-name">${title.trim()}</div>
          <div class="file-size">${artist.trim()}</div>
        </div>
        <button class="file-btn" id="${id}" style="background:linear-gradient(135deg, #9370DB, #8A2BE2)">▶ 播放</button>
      </div>`;
    });
  });
  
  const avatarStyle=avatars.ai?`background-image:url(${avatars.ai});background-size:cover;background-position:center`:'';
  const timeStr=timestamp?formatTime(timestamp):'';
  const floorStr=floorNumber?`#${floorNumber}`:'';
  const elapsedStr=elapsed?`⚡ 生成用时 ${elapsed}s`:'';
  
  contentDiv.innerHTML=`
    ${thinkingHtml}
    <div class="msg-text">${processed}</div>
    <div class="msg-time">${[floorStr,timeStr,elapsedStr].filter(Boolean).join(' · ')}</div>
    <div class="msg-actions">
      <button class="msg-action-btn" onclick="regenerateMessage(${msgIndex})">
        <span>刷新</span>
        <span>重说</span>
      </button>
      <button class="msg-action-btn" onclick="copyMessage(${msgIndex})">
        <span>📋</span>
        <span>复制</span>
      </button>
      <button class="msg-action-btn" onclick="editMessage(${msgIndex})">
        <span>✏️</span>
        <span>修改</span>
      </button>
      <button class="msg-action-btn" onclick="deleteRound(${msgIndex})" style="color:#888888">
        <span>🗑️</span>
        <span>删除本轮</span>
      </button>
    </div>
  `;
  
  msg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div>`;
  msg.appendChild(contentDiv);
  
  box.appendChild(msg);
  if(scroll) box.scrollTop=box.scrollHeight;
}

function toggleThinking(id){
  const content=document.getElementById(id);
  const toggle=content.previousElementSibling;
  content.classList.toggle('show');
  toggle.classList.toggle('open');
}

function formatTime(timestamp){
  const date=new Date(timestamp);
  return date.toLocaleString('zh-CN',{
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function formatInterval(ms){
  if(ms<1000) return `${ms}ms`;
  if(ms<60000) return `${(ms/1000).toFixed(0)}秒`;
  if(ms<3600000){
    const m=Math.floor(ms/60000);
    const s=Math.floor((ms%60000)/1000);
    return s>0?`${m}分${s}秒`:`${m}分钟`;
  }
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return m>0?`${h}小时${m}分`:`${h}小时`;
}

function escapeHtml(text){
  const div=document.createElement('div');
  div.textContent=text;
  return div.innerHTML;
}

// ========== AI消息操作 ==========
function regenerateMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  // 找到这条AI消息前面的用户消息
  const userMsg=chat.messages[msgIndex-1];
  if(!userMsg||userMsg.role!=='user'){toast('找不到对应的用户消息');return;}
  
  // 删除这条AI消息及之后所有内容，保留用户消息
  chat.messages=chat.messages.slice(0,msgIndex);
  saveChats();
  renderMessages(chat.messages);
  
  // 直接调用API重新生成，不走input框
  sendMessageWithContent(null);
}

function deleteRound(aiMsgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  // aiMsgIndex是AI消息的索引，前一条是用户消息
  const userIdx=aiMsgIndex-1;
  if(userIdx<0||chat.messages[userIdx]?.role!=='user') return;
  // 删除这一轮（用户+AI，共2条）
  chat.messages.splice(userIdx,2);
  saveChats();
  renderMessages(chat.messages);
  toast('已删除本轮对话');
}

function copyMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  const msg=chat.messages[msgIndex];
  let text='';
  const c=msg.content;
  if(typeof c==='string') text=c;
  else if(c&&typeof c==='object'&&!Array.isArray(c)) text=c.text||c.content||JSON.stringify(c);
  else if(Array.isArray(c)) text=c.filter(p=>p.type==='text').map(p=>p.text).join('\n');
  
  if(!text){toast('没有可复制的文本内容');return;}
  
  navigator.clipboard.writeText(text).then(()=>{
    toast('✅ 已复制到剪贴板');
  }).catch(()=>{
    // 回退方案
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('✅ 已复制');
  });
}

function editMessage(msgIndex){
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat||msgIndex<0||msgIndex>=chat.messages.length) return;
  
  if(msgIndex===0||chat.messages[msgIndex-1].role!=='user'){
    toast('只能编辑用户消息后的AI回复');
    return;
  }
  
  const userMsg=chat.messages[msgIndex-1];
  const userText=typeof userMsg.content==='string'?userMsg.content:
    (Array.isArray(userMsg.content)?
      (userMsg.content.find(p=>p.type==='text')?.text||''):'');
  
  document.getElementById('editContent').value=userText;
  editingMessageIndex=msgIndex;
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('show');
  editingMessageIndex=null;
}

function saveEditedMessage(){
  if(editingMessageIndex===null) return;
  
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  
  const newText=document.getElementById('editContent').value.trim();
  if(!newText){
    toast('消息内容不能为空');
    return;
  }
  
  // 更新用户消息
  chat.messages[editingMessageIndex-1].content=newText;
  
  // 删除该AI回复及之后的消息
  chat.messages=chat.messages.slice(0,editingMessageIndex);
  
  saveChats();
  renderMessages(chat.messages);
  closeEditModal();
  
  // 重新生成
  sendMessageWithContent(null);
}

// ========== 发送消息 ==========
async function sendMessage(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  const hasAttach=Object.values(attachments).some(a=>a.length>0);
  if(!text&&!hasAttach) return;
  
  if(!currentAPIId){toast('请先在设置中选择或创建API配置');showSettings();return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先完善API配置');showSettings();return;}
  const chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  
  input.value='';
  input.style.height='auto';
  
  let userContent;
  if(!hasAttach){
    userContent=text;
  } else {
    userContent=[];
    if(text) userContent.push({type:'text',text});
    attachments.img.forEach(a=>{
      const cacheId=a.cacheId||('img_'+Date.now()+'_'+Math.random().toString(36).slice(2));
      imgCache[cacheId]=a.dataUrl;
      userContent.push({type:'image_url',image_url:{url:a.dataUrl},_imgCacheId:cacheId});
    });
    attachments.file.forEach(a=>userContent.push({type:'text',text:`【文件：${a.name}】\n\`\`\`\n${a.text.slice(0,50000)}\n\`\`\``,_isFile:true,_name:a.name}));
    attachments.url.forEach(a=>userContent.push({type:'text',text:`【网页：${a.url}】\n\`\`\`\n${a.content}\n\`\`\``,_isUrl:true,_url:a.url}));
    attachments.music.forEach(a=>userContent.push({type:'text',text:`【网易云音乐】\n\`\`\`\n${a.data}\n\`\`\``,_isMusic:true,_title:a.title}));
  }
  
  const timestamp=Date.now();
  const intervalMs=lastMessageTime?(timestamp-lastMessageTime):null;
  lastMessageTime=timestamp;
  
  chat.messages.push({role:'user',content:userContent,timestamp,intervalMs});
  const currentFloor=Math.floor(chat.messages.length/2)+1;
  addUserMessage(userContent,true,timestamp,currentFloor,intervalMs);
  
  if(chat.messages.length===1&&chat.title==='新对话'){
    chat.title=text.slice(0,30);
    document.getElementById('chatTitle').textContent=chat.title;
    renderChatList();
  }
  
  attachments={img:[],file:[],url:[],music:[]};
  renderAttachChips();
  
  await sendMessageWithContent(chat);
}

// 核心发送逻辑（sendMessage和regenerate共用）
async function sendMessageWithContent(chat){
  if(!chat) chat=chats.find(c=>c.id===currentChatId);
  if(!chat) return;
  if(!currentAPIId){toast('请先配置API');return;}
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  if(!api||!api.url||!api.key){toast('请先完善API配置');return;}
  
  document.getElementById('sendBtn').disabled=true;
  
  // 构建系统提示词
  const now=new Date();
  const timeInfo=`当前时间：${now.toLocaleString('zh-CN',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    weekday:'long',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    hour12:false
  })}`;
  
  // 注入所有消息时间戳信息，让AI能看到每条消息的时间
  let msgTimelineInfo='# 对话时间轴\n';
  chat.messages.forEach((m,i)=>{
    if(m.timestamp){
      const role=m.role==='user'?'用户':'AI';
      const t=new Date(m.timestamp).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const interval=m.intervalMs!=null?`（距上条消息：${formatInterval(m.intervalMs)}）`:'';
      msgTimelineInfo+=`第${Math.floor(i/2)+1}轮-${role} [${t}]${interval}\n`;
    }
  });
  msgTimelineInfo+='\n';
  
  const memoryPrompt=buildMemoryPrompt();
  const locationPrompt=buildLocationPrompt();
  const activityPrompt=buildActivityPrompt();
  const activityContextBlock=buildActivityContextBlock();
  const diaryPrompt=typeof buildDiaryPrompt==='function'?buildDiaryPrompt():'';
  const systemPrompt=`${timeInfo}\n\n${msgTimelineInfo}${locationPrompt}${memoryPrompt}${activityPrompt}${diaryPrompt}`;
  window.__lastActivityPrompt = activityPrompt;
  window.__lastActivityContextBlock = activityContextBlock;
  window.__lastMergedActivityHistory = getMergedActivityHistory();
  console.log('[发送给AI的手机活动提示词]', activityPrompt, activityContextBlock, window.__lastMergedActivityHistory);
  
  let apiMessages=[];
  if(systemPrompt.trim()) apiMessages.push({role:'system',content:systemPrompt});
  if(activityContextBlock) apiMessages.push({role:'system',content:activityContextBlock});
  chat.messages.forEach(m=>{
    // 跳过activity分隔线和AI感知消息
    if(m.role==='activity'||m.isAwareness) return;
    let c=m.content;
    if(m.role==='assistant'){
      // 只取纯文本字符串
      if(typeof c==='string') c=c;
      else if(c&&typeof c==='object'&&!Array.isArray(c)) c=c.text||c.content||'';
      else if(Array.isArray(c)) c=c.filter(b=>b&&b.type==='text').map(b=>b.text).join('\n');
      else c='';
      c=String(c).trim();
      if(!c) return; // 跳过空AI消息，空消息会让很多API报错
      apiMessages.push({role:'assistant',content:c});
    } else if(m.role==='user'){
      if(Array.isArray(c)){
        const parts=c.map(p=>{
          if(!p||!p.type) return null;
          if(p.type==='image_url'){
            const url=(p._imgCacheId&&imgCache[p._imgCacheId])||p.image_url?.url||'';
            if(!url||url==='[图片已从存储中移除]'||url.length<50) return null;
            return {type:'image_url',image_url:{url}};
          }
          if(p.type==='text'){
            const t=String(p.text||'').trim();
            if(!t) return null;
            return {type:'text',text:t};
          }
          return null;
        }).filter(Boolean);
        if(!parts.length) return; // 整条用户消息是空的，跳过
        // 如果只有文本部分，简化成字符串
        const onlyText=parts.every(p=>p.type==='text');
        c=onlyText?parts.map(p=>p.text).join('\n'):parts;
      } else {
        c=String(c||'').trim();
        if(!c) return;
      }
      apiMessages.push({role:'user',content:c});
    }
  });
  window.__lastApiMessages = apiMessages;
  
  // 创建AI消息占位（流式）
  const box=document.getElementById('messages');
  const loadingMsg=document.createElement('div');
  loadingMsg.className='msg ai';
  const avatarStyle=avatars.ai?`background-image:url(${avatars.ai});background-size:cover;background-position:center`:'';
  const streamContentDiv=document.createElement('div');
  streamContentDiv.className='msg-content';
  const streamTextDiv=document.createElement('div');
  streamTextDiv.className='msg-text';
  streamTextDiv.style.opacity='0.8';
  streamTextDiv.textContent='正在思考...';
  streamContentDiv.appendChild(streamTextDiv);
  loadingMsg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div>`;
  loadingMsg.appendChild(streamContentDiv);
  box.appendChild(loadingMsg);
  box.scrollTop=box.scrollHeight;
  
  const startTime=Date.now();
  
  try{
    const res=await fetch(`${api.url}/chat/completions`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${api.key}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        model:api.model,
        messages:apiMessages,
        max_tokens:4096,
        stream:true
      })
    });
    
    if(!res.ok){
      const errText=await res.text();
      throw new Error(`HTTP ${res.status}: ${errText.slice(0,200)}`);
    }
    
    // 流式读取
    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let fullText='';
    let thinkingText='';
    let buffer='';
    let scrollTimer=null;
    
    streamTextDiv.textContent='';
    streamTextDiv.style.opacity='1';
    
    // 节流滚动：最多每100ms滚动一次，避免每个token都触发reflow
    const throttledScroll=()=>{
      if(scrollTimer) return;
      scrollTimer=setTimeout(()=>{
        box.scrollTop=box.scrollHeight;
        scrollTimer=null;
      },100);
    };
    
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        const l=line.trim();
        if(!l||l==='data: [DONE]') continue;
        if(!l.startsWith('data: ')) continue;
        try{
          const json=JSON.parse(l.slice(6));
          const delta=json.choices?.[0]?.delta;
          if(!delta) continue;
          if(delta.reasoning_content) thinkingText+=delta.reasoning_content;
          if(delta.thinking) thinkingText+=delta.thinking;
          if(delta.content){
            fullText+=delta.content;
            // 增量追加文本节点，避免每次替换整个字符串
            streamTextDiv.appendChild(document.createTextNode(delta.content));
            throttledScroll();
          }
        }catch(e){}
      }
    }
    if(scrollTimer) clearTimeout(scrollTimer);
    
    loadingMsg.remove();
    
    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    
    const storedContent=thinkingText?{text:fullText,thinking:thinkingText}:fullText;
    
    const aiTimestamp=Date.now();
    chat.messages.push({role:'assistant',content:storedContent,timestamp:aiTimestamp,elapsed});
    const msgIdx=chat.messages.length-1;
    const aiFloor=Math.floor(msgIdx/2)+1;
    addAIMessage(storedContent,true,aiTimestamp,msgIdx,aiFloor,elapsed);
    saveChats();
    
    parseAIMemoryCommands(fullText);
    parseAITransfer(fullText);
    
    if(aiFloor%50===0&&memoryTables.length>0){
      toast('已达50轮对话，正在自动整理记忆...');
      setTimeout(()=>aiOrganizeMemory(),1000);
    }
  }catch(e){
    loadingMsg.remove();
    // 如果是流式不支持，回退到普通模式
    if(e.message.includes('stream')||e.message.includes('400')){
      await sendMessageFallback(chat,apiMessages,avatarStyle);
    } else {
      toast('发送失败：'+e.message);
      chat.messages.pop();
    }
  }
  
  document.getElementById('sendBtn').disabled=false;
}

// 非流式回退（兼容不支持stream的API）
async function sendMessageFallback(chat,apiMessages,avatarStyle){
  const api=apiConfigs.find(a=>a.id===currentAPIId);
  const box=document.getElementById('messages');
  const loadingMsg=document.createElement('div');
  loadingMsg.className='msg ai';
  loadingMsg.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div><div class="msg-content"><div class="msg-text" style="opacity:.6">正在思考...</div></div>`;
  box.appendChild(loadingMsg);
  const startTime=Date.now();
  try{
    const res=await fetch(`${api.url}/chat/completions`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${api.key}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:api.model,messages:apiMessages,max_tokens:4096})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const msgObj=data.choices[0].message;
    loadingMsg.remove();
    let thinkingText='';
    if(Array.isArray(msgObj.content)){const tb=msgObj.content.find(b=>b.type==='thinking');if(tb) thinkingText=tb.thinking||'';}
    if(!thinkingText&&msgObj.thinking) thinkingText=msgObj.thinking;
    if(!thinkingText&&msgObj.reasoning_content) thinkingText=msgObj.reasoning_content;
    let replyText='';
    if(typeof msgObj.content==='string') replyText=msgObj.content;
    else if(Array.isArray(msgObj.content)) replyText=msgObj.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    const storedContent=thinkingText?{text:replyText,thinking:thinkingText}:replyText;
    const aiTimestamp=Date.now();
    chat.messages.push({role:'assistant',content:storedContent,timestamp:aiTimestamp,elapsed});
    const msgIdx=chat.messages.length-1;
    const aiFloor=Math.floor(msgIdx/2)+1;
    addAIMessage(storedContent,true,aiTimestamp,msgIdx,aiFloor,elapsed);
    saveChats();
    parseAIMemoryCommands(replyText);
    parseAITransfer(replyText);
  }catch(e){
    loadingMsg.remove();
    toast('发送失败：'+e.message);
    chat.messages.pop();
  }
}

async function fetchUrl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url){toast('请输入网址');return;}
  if(!url.startsWith('http')){toast('网址必须以http://或https://开头');return;}
  toast('正在抓取...');
  
  // 尝试多个代理，依次回退
  const proxies=[
    async ()=>{
      const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&charset=utf-8`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.contents) throw new Error('空内容');
      return d.contents;
    },
    async ()=>{
      const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    },
    async ()=>{
      const r=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    }
  ];
  
  let html='',lastErr='';
  for(const proxy of proxies){
    try{ html=await proxy(); break; }
    catch(e){ lastErr=e.message; continue; }
  }
  
  if(!html){ toast('抓取失败（所有代理均不可用）：'+lastErr); return; }
  
  try{
    const div=document.createElement('div');
    div.innerHTML=html;
    // 移除script/style/nav等噪音节点
    div.querySelectorAll('script,style,nav,footer,header,aside,[class*="menu"],[class*="sidebar"]').forEach(el=>el.remove());
    const text=(div.textContent||div.innerText||'').replace(/\s+/g,' ').trim().slice(0,12000);
    if(!text||text.length<50) throw new Error('抓取内容为空或过短');
    attachments.url.push({url,content:text});
    renderAttachChips();
    toast(`✅ 网页已抓取（${text.length} 字符）`);
    closeUrlModal();
  }catch(e){toast('解析失败：'+e.message);}
}

// AI写入便签（在AI回复中检测"记住："指令）
function parseAIMemoryCommands(text){
  // 匹配格式：【记忆】标题：内容 或 记住：内容 或 [记忆]内容
  const patterns=[
    /【记忆[：:]?\s*(.+?)】[：:]\s*(.+)/g,
    /\[记忆\]\s*(?:(.+?)[：:])?\s*(.+)/g,
    /记住[：:]\s*(?:「(.+?)」[：:])?\s*(.+)/g,
  ];
  let found=false;
  patterns.forEach(re=>{
    let m;
    while((m=re.exec(text))!==null){
      const title=m[1]?m[1].trim():'AI记录';
      const body=m[2]?m[2].trim():m[1]?m[1].trim():'';
      if(body){
        memoryNotes.unshift({id:Date.now()+Math.random(),title,body,time:Date.now()});
        found=true;
      }
    }
  });
  if(found){saveMemory();toast('✅ AI已更新记忆便签');}
}

  const latestNames = records
    .map(r => normalizeActivityAppName(r.appName))

      const parts=[d.country,d.regionName,d.city,d.district].filter(Boolean);
      userLocation={
        lat:d.lat, lng:d.lon,
        address:parts.join(' '),
        city:d.city||d.regionName||d.country,
        ip:d.query,
        time:Date.now()
      };
      localStorage.setItem('aiUserLocation',JSON.stringify(userLocation));
      btn.textContent='📍 '+(userLocation.city||'已定位');
      if(showToast) toast(`✅ 定位成功：${userLocation.address}（IP: ${d.query}）`);
      return true;
    }
  }catch(e){}
  
  // 服务2: ipinfo.io
  try{
    const res=await fetch('https://ipinfo.io/json',{signal:AbortSignal.timeout(5000)});
    const d=await res.json();
    if(d.city){
      const parts=[d.country,d.region,d.city].filter(Boolean);
      userLocation={
        lat:parseFloat(d.loc?.split(',')[0]||0),
        lng:parseFloat(d.loc?.split(',')[1]||0),
        address:parts.join(' '),
        city:d.city||d.region,
        ip:d.ip,
        time:Date.now()
      };
      localStorage.setItem('aiUserLocation',JSON.stringify(userLocation));
      btn.textContent='📍 '+(userLocation.city||'已定位');
      if(showToast) toast(`✅ 定位成功：${userLocation.address}`);
      return true;
    }
  }catch(e){}

  return false;
}

function buildLocationPrompt(){
  if(!userLocation) return '';
  const age=Date.now()-userLocation.time;
  const ageStr=age<3600000?`${Math.round(age/60000)}分钟前`:
                age<86400000?`${Math.round(age/3600000)}小时前`:'较早前';
  const ipStr=userLocation.ip?`\nIP地址：${userLocation.ip}`:'';
  return `# 用户位置（${ageStr}获取）\n地址：${userLocation.address||'未知'}\n城市：${userLocation.city||'未知'}${ipStr}\n坐标：${userLocation.lat?.toFixed(5)},${userLocation.lng?.toFixed(5)}\n\n`;
}

function parseAITransfer(text){
  // 检测AI转账指令：转账给你X小克币 / 给你转X小克币 / 转给你X克币
  const patterns=[
    /转账给你\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /给你转\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /转给你\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
    /向你转账\s*(\d+(?:\.\d+)?)\s*(?:小克币|克币)/,
  ];
  for(const re of patterns){
    const m=text.match(re);
    if(m){
      const amount=parseFloat(m[1]);
      if(amount>0&&wallet.balance>=amount){
        wallet.balance=Math.round((wallet.balance-amount)*100)/100;
        saveWallet();
        renderWallet();
        toast(`💰 收到AI转账 ${amount} 小克币！钱包余额：${wallet.balance}`);
        return;
      } else if(amount>wallet.balance){
        toast(`💸 AI余额不足，无法完成转账`);
        return;
      }
    }
  }
}

function importData(){
  // 手机端自动关闭侧边栏
  if(window.innerWidth<=768) closeSidebar();
  
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const importData=JSON.parse(ev.target.result);
        
        // 验证数据格式
        if(!importData.version){
          throw new Error('文件格式不正确');
        }
        
        // 询问导入方式
        const mode=confirm('点击"确定"合并导入（保留现有数据）\n点击"取消"覆盖导入（清空现有数据）');
        
        if(mode){
          // 合并模式
          if(importData.chats){
            importData.chats.forEach(chat=>{
              if(!chats.find(c=>c.id===chat.id)){
                chats.push(chat);
              }
            });
          }
          if(importData.memoryTables){
            importData.memoryTables.forEach(table=>{
              if(!memoryTables.find(t=>t.name===table.name)){
                memoryTables.push(table);
              }
            });
          }
          if(importData.apiConfigs){
            importData.apiConfigs.forEach(api=>{
              if(!apiConfigs.find(a=>a.id===api.id)){
                apiConfigs.push(api);
              }
            });
          }
          toast('已合并导入备份');
        } else {
          // 覆盖模式
          if(importData.chats) chats=importData.chats;
          if(importData.memoryTables) memoryTables=importData.memoryTables;
          if(importData.apiConfigs) apiConfigs=importData.apiConfigs;
          if(importData.currentAPIId) currentAPIId=importData.currentAPIId;
          if(importData.config) config=importData.config;
          if(importData.avatars) avatars=importData.avatars;
          toast('已覆盖导入备份');
        }
        
        // 保存到localStorage
        saveChats();
        saveMemory();
        saveAPIConfigs();
        saveConfig();
        saveAvatars();
        
        // 刷新界面
        renderChatList();
        renderAPIList();
        updateAvatarPreviews();
        
        if(chats.length>0){
          switchChat(chats[0].id);
        }
        
      }catch(err){
        console.error('导入失败：',err);
        toast('导入失败：'+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ========== 日记本 ==========
let diaries = { me: [], ai: [] };  // { id, date, content, timestamp }
let currentDiaryOwner = 'me';
let currentDiaryId = null;

function loadDiaries() {
  try {
    const saved = localStorage.getItem('aiDiaries');
    if (saved) diaries = JSON.parse(saved);
    if (!diaries.me) diaries.me = [];
    if (!diaries.ai) diaries.ai = [];
  } catch(e) { diaries = { me: [], ai: [] }; }
}

function saveDiaries() {
  try { localStorage.setItem('aiDiaries', JSON.stringify(diaries)); } catch(e) {}
}

function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'diary') renderDiaryList();
}

function switchDiaryOwner(owner) {
  currentDiaryOwner = owner;
  currentDiaryId = null;
  document.getElementById('diary-tab-me').classList.toggle('active', owner === 'me');
  document.getElementById('diary-tab-ai').classList.toggle('active', owner === 'ai');
  // AI日记只读，隐藏新建按钮
  document.getElementById('addDiaryBtn').style.display = owner === 'me' ? 'block' : 'none';
  renderDiaryList();
  showDiaryEmpty();
}

function renderDiaryList() {
  const list = document.getElementById('diaryEntryList');
  const entries = diaries[currentDiaryOwner] || [];
  if (entries.length === 0) {
    list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--浅色文字);text-align:center">还没有日记</div>';
    return;
  }
  list.innerHTML = entries.slice().reverse().map(entry => {
    const d = new Date(entry.timestamp);
    const dateStr = d.toLocaleDateString('zh-CN', { month:'2-digit', day:'2-digit' });
    const timeStr = d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    const preview = entry.content.slice(0, 30).replace(/\n/g, ' ') || '（空白）';
    return `<div class="diary-entry-item ${entry.id === currentDiaryId ? 'active' : ''}" onclick="openDiaryEntry('${entry.id}')">
      <div class="diary-entry-date">${dateStr} ${timeStr}</div>
      <div class="diary-entry-preview">${preview}</div>
    </div>`;
  }).join('');
}

function openDiaryEntry(id) {
  currentDiaryId = id;
  const entries = diaries[currentDiaryOwner];
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  const d = new Date(entry.timestamp);
  const dateStr = d.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short', hour:'2-digit', minute:'2-digit' });
  document.getElementById('diaryDateDisplay').textContent = dateStr;
  document.getElementById('diaryDeleteBtn').style.display = currentDiaryOwner === 'me' ? 'inline-block' : 'none';

  const full = document.getElementById('diaryEntryFull');
  const isReadOnly = currentDiaryOwner === 'ai';
  full.innerHTML = `
    <div class="diary-entry-header">${dateStr} · ${currentDiaryOwner === 'me' ? '我的日记' : 'AI的日记'}</div>
    <textarea class="diary-textarea" id="diaryTextarea" placeholder="写下今天的心情..."
      ${isReadOnly ? 'readonly style="color:var(--浅色文字);cursor:default"' : ''}
    >${entry.content}</textarea>
  `;

  renderDiaryList();
}

function showDiaryEmpty() {
  currentDiaryId = null;
  document.getElementById('diaryDateDisplay').textContent = '选择或新建一篇日记';
  document.getElementById('diaryDeleteBtn').style.display = 'none';
  document.getElementById('diaryEntryFull').innerHTML = `
    <div class="diary-empty">
      <div>还没有日记</div>
      ${currentDiaryOwner === 'me' ? '<button class="diary-add-btn" onclick="addDiaryEntry()">新建第一篇</button>' : ''}
    </div>`;
}

function addDiaryEntry() {
  if (currentDiaryOwner !== 'me') return;
  const id = 'diary_' + Date.now();
  const entry = { id, content: '', timestamp: Date.now() };
  diaries.me.push(entry);
  saveDiaries();
  renderDiaryList();
  openDiaryEntry(id);
}

function saveDiaryEntry() {
  if (!currentDiaryId || currentDiaryOwner !== 'me') return;
  const ta = document.getElementById('diaryTextarea');
  if (!ta) return;
  const entry = diaries.me.find(e => e.id === currentDiaryId);
  if (entry) {
    entry.content = ta.value;
    entry.updatedAt = Date.now();
    saveDiaries();
    renderDiaryList();
    toast('已保存');
  }
}

function deleteDiaryEntry() {
  if (!currentDiaryId || currentDiaryOwner !== 'me') return;
  if (!confirm('确定删除这篇日记？')) return;
  diaries.me = diaries.me.filter(e => e.id !== currentDiaryId);
  saveDiaries();
  currentDiaryId = null;
  renderDiaryList();
  showDiaryEmpty();
}

// AI写日记：触发AI写一篇日记并存入ai diary
async function triggerAIDiary() {
  const api = apiConfigs.find(a => a.id === currentAPIId) || apiConfigs[0];
  if (!api || !api.key) return;

  // 获取今天有没有AI日记了
  const today = new Date().toDateString();
  const alreadyToday = (diaries.ai || []).some(e => new Date(e.timestamp).toDateString() === today);
  if (alreadyToday) return;

  const memoryP = typeof buildMemoryPrompt === 'function' ? buildMemoryPrompt() : '';
  const activityP = typeof buildActivityPrompt === 'function' ? buildActivityPrompt() : '';
  const myDiaries = (diaries.me || []).slice(-3).map(e => {
    const d = new Date(e.timestamp).toLocaleDateString('zh-CN');
    return `[${d}] ${e.content.slice(0, 200)}`;
  }).join('\n');

  const prompt = `今天是${new Date().toLocaleDateString('zh-CN')}，请以日记的形式，用第一人称写一篇简短的日记（200字以内），记录你今天的"所见所感"——包括和我的对话、我的手机使用记录、对我的观察和想法。语气自然，像真实的日记，不要用标题格式。\n\n${activityP}\n用户的近期日记参考：\n${myDiaries}\n\n${memoryP}`;

  try {
    const res = await fetch(`${api.url}/chat/completions`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${api.key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: api.model,
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 400,
        stream: false
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (!text) return;
    if (!diaries.ai) diaries.ai = [];
    diaries.ai.push({ id: 'ai_' + Date.now(), content: text, timestamp: Date.now() });
    saveDiaries();
  } catch(e) { console.log('[AI日记] 失败', e.message); }
}

// 把我的日记注入AI上下文
function buildDiaryPrompt() {
  const myEntries = (diaries.me || []).slice(-5);
  const aiEntries = (diaries.ai || []).slice(-3);
  if (myEntries.length === 0 && aiEntries.length === 0) return '';
  let p = '# 日记本\n';
  if (myEntries.length > 0) {
    p += '## 用户的近期日记\n';
    myEntries.forEach(e => {
      const d = new Date(e.timestamp).toLocaleDateString('zh-CN');
      p += `[${d}] ${e.content.slice(0, 300)}\n\n`;
    });
  }
  if (aiEntries.length > 0) {
    p += '## AI的日记（供参考）\n';
    aiEntries.forEach(e => {
      const d = new Date(e.timestamp).toLocaleDateString('zh-CN');
      p += `[${d}] ${e.content.slice(0, 200)}\n\n`;
    });
  }
  return p;
}

<script>
// ========== 快捷指令 v2：静默感知 ==========

// ---- 配置 ----
let shortcutConfig = {
  enabled: true,
  serverUrl: '',          // 中间服务器地址，空=仅本地URL接收
  pollInterval: 30,       // 轮询间隔（秒），0=不轮询
  aiAutoReply: true,      // 有新活动时AI是否自动发消息（回头再看模式）
  aiReplyDelay: 0,        // AI回复延迟（分钟），0=攒到下次打开网页再触发
};

let appUsageHistory = [];   // { appName, timestamp, shown }
let _pollTimer = null;
let _lastPollTime = 0;
let _pendingActivities = []; // 还未触发AI回复的活动

function normalizeActivityAppName(raw) {
  if (raw == null) return '';
  if (typeof raw === 'object') {
    raw = raw.appName ?? raw.app ?? raw.name ?? raw.content ?? raw.text ?? '';
  }
  const text = String(raw).trim();
  if (!text || text === '1' || text === 'undefined' || text === 'null' || text === '[object Object]') {
    return '';
  }
  return text;
}

function normalizeActivityRecord(raw, fallbackSource) {
  if (raw == null) return null;
  const appName = normalizeActivityAppName(raw);
  if (!appName) return null;
  const timestamp = parseInt(raw?.timestamp ?? raw?.ts ?? raw?.time, 10) || Date.now();
  return {
    appName,
    timestamp,
    source: raw?.source || fallbackSource || 'server',
    shown: !!raw?.shown
  };
}

function getMergedActivityHistory() {
  const historyRecords = (appUsageHistory || [])
    .map(item => normalizeActivityRecord(item, item?.source || 'history'))
    .filter(Boolean);

  const chat = chats.find(c => c.id === currentChatId);
  const chatRecords = !chat ? [] : (chat.messages || [])
    .filter(m => m && m.role === 'activity')
    .map(m => normalizeActivityRecord({
      appName: m.appName ?? m.content,
      timestamp: m.timestamp,
      source: m.source || 'chat'
    }, 'chat'))
    .filter(Boolean);

  const merged = [...historyRecords, ...chatRecords]
    .sort((a, b) => a.timestamp - b.timestamp);

  const deduped = [];
  merged.forEach(record => {
    const exists = deduped.find(item =>
      item.appName === record.appName &&
      Math.abs(item.timestamp - record.timestamp) < 30000
    );
    if (!exists) deduped.push(record);
  });
  return deduped;
}

function extractActivityEvents(payload) {
  const candidates = [];

  if (Array.isArray(payload)) {
    candidates.push(...payload);
  } else if (payload && typeof payload === 'object') {
    if (Array.isArray(payload.events)) candidates.push(...payload.events);
    if (Array.isArray(payload.data)) candidates.push(...payload.data);
    if (payload.received) candidates.push(payload.received);
    if (payload.event) candidates.push(payload.event);
    if (payload.appName || payload.app || payload.name || payload.content) candidates.push(payload);
  }

  return candidates
    .map(item => normalizeActivityRecord(item, 'server'))
    .filter(Boolean);
}

// ---- 持久化 ----
function loadShortcutConfig() {
  try {
    const c = localStorage.getItem('shortcutConfig2');
    if (c) shortcutConfig = { ...shortcutConfig, ...JSON.parse(c) };
    const h = localStorage.getItem('appUsageHistory2');
    if (h) appUsageHistory = JSON.parse(h).map(item => normalizeActivityRecord(item, 'storage')).filter(Boolean);
    const p = localStorage.getItem('pendingActivities');
    if (p) _pendingActivities = JSON.parse(p).map(item => normalizeActivityRecord(item, 'storage')).filter(Boolean);
  } catch(e) {}
}
function saveShortcutConfig() {
  localStorage.setItem('shortcutConfig2', JSON.stringify(shortcutConfig));
}
function saveAppUsageHistory() {
  appUsageHistory = appUsageHistory.map(item => normalizeActivityRecord(item, item?.source || 'storage')).filter(Boolean);
  _pendingActivities = _pendingActivities.map(item => normalizeActivityRecord(item, item?.source || 'storage')).filter(Boolean);
  if (appUsageHistory.length > 200) appUsageHistory = appUsageHistory.slice(-200);
  localStorage.setItem('appUsageHistory2', JSON.stringify(appUsageHistory));
  localStorage.setItem('pendingActivities', JSON.stringify(_pendingActivities));
}

// ---- 核心：记录一条活动 ----
// 只记录，不打扰，不跳转，不发消息
function recordActivity(appName, timestamp, source) {
  appName = normalizeActivityAppName(appName);
  if (!appName) return;
  const ts = parseInt(timestamp) || Date.now();
  // 去重：同一个App 30秒内不重复记录
  const recent = appUsageHistory.find(r => r.appName === appName && ts - r.timestamp < 30000);
  if (recent) return;

  const record = { appName, timestamp: ts, source: source || 'url', shown: false };
  appUsageHistory.push(record);
  _pendingActivities.push(record);
  saveAppUsageHistory();

  // 在当前对话聊天流中插入分隔线
  insertActivityDivider(appName, ts);

  console.log('[活动记录]', appName, new Date(ts).toLocaleTimeString('zh-CN'));
}

// ---- 在聊天流中插入小字分隔线 ----
function insertActivityDivider(appName, timestamp) {
  const box = document.getElementById('messages');
  if (!box) return;
  const timeStr = new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'activity-divider';
  div.dataset.ts = timestamp;
  div.innerHTML = `<span>— 在${appName} · ${timeStr} —</span>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  // 同时记录到当前chat（type=activity，不参与API调用）
  const chat = chats.find(c => c.id === currentChatId);
  if (chat) {
    chat.messages.push({ role: 'activity', appName, timestamp, content: appName });
    saveChats();
  }
}

// ---- 处理URL Scheme（快捷指令直接打开网页时）----
// 现在不再强制跳转！快捷指令改成调服务器接口，这里只作备用
function handleURLScheme() {
  const hash = window.location.hash;
  if (!hash || hash === '#') return;
  try {
    const params = new URLSearchParams(hash.substring(1));
    const appName = params.get('app');
    const ts = params.get('time') || Date.now();
    if (!appName) return;
    recordActivity(appName, ts, 'url');
    // 立即清除hash，不让页面感知到跳转
    history.replaceState(null, '', window.location.pathname + window.location.search);
  } catch(e) {}
}

// ---- 服务器轮询（推荐方式：快捷指令→服务器→网页轮询）----
// 服务器接口约定：GET /events?since=<timestamp>
// 返回：[{ appName, timestamp }]
async function pollServer() {
  if (!shortcutConfig.serverUrl) return;
  try {
    const base = shortcutConfig.serverUrl.replace(/\/$/, '').replace(/\/api\/log$/, '');
    const url = base + `/api/events?since=${_lastPollTime}&_=${Date.now()}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return;
    let events = await res.json();
    // 兼容服务器返回单个对象或数组
    if (!Array.isArray(events)) events = [events];
    if (events.length > 0) {
      let gotNew = false;
      events.forEach(e => {
        // 兼容各种字段名
        const name = e.appName || e.app_name || e.app || e.name;
        const ts = e.timestamp || e.ts || e.time || Date.now();
        if (name && typeof name === 'string' && name.trim()) {
          recordActivity(name.trim(), ts, 'server');
          gotNew = true;
        }
      });
      if (gotNew) _lastPollTime = Date.now();
    }
  } catch(e) {
    // 网络错误静默处理
  }
}

function startPolling() {
  stopPolling();
  if (!shortcutConfig.enabled || !shortcutConfig.serverUrl || shortcutConfig.pollInterval <= 0) return;
  _pollTimer = setInterval(pollServer, shortcutConfig.pollInterval * 1000);
  pollServer(); // 立即执行一次
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ---- 当用户回到网页，触发AI对pending活动的感知回复 ----
// 不是用户发消息，而是AI主动在对话里留言
let _awarenessRunning = false;
async function triggerAIAwareness() {
  if (!shortcutConfig.aiAutoReply) return;
  if (_pendingActivities.length === 0) return;
  // 防止与正在进行的用户发消息并发
  if (document.getElementById('sendBtn')?.disabled) return;
  if (_awarenessRunning) return;
  _awarenessRunning = true;

  const pending = [..._pendingActivities];
  _pendingActivities = [];
  saveAppUsageHistory();

  // 检查是否有API配置
  const api = apiConfigs.find(a => a.id === currentAPIId) || apiConfigs[0];
  if (!api || !api.key) return;

  // 构建活动摘要给AI
  const pendingSummary = pending
    .map(r => normalizeActivityRecord(r, r?.source || 'pending'))
    .filter(Boolean)
    .map(r => {
    const t = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return `${t} 在用「${r.appName}」`;
  }).join('、');
  if (!pendingSummary) return;

  // 最近24小时的历史活动
  const last24h = getMergedActivityHistory()
    .filter(r => Date.now() - r.timestamp < 24 * 3600 * 1000)
    .slice(-30);
  const historySummary = last24h.length > 0
    ? last24h.map(r => {
        const d = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
        return `${d} ${r.appName}`;
      }).join(' / ')
    : '暂无';

  const systemNote = `[手机活动感知]
刚才（你离开期间）：${pendingSummary}
今天的手机使用记录：${historySummary}

请以自然的口吻说一句话，就好像你一直默默陪着ta，注意到ta用了这些App。不要说"我检测到"或"系统通知"，口气随意一点，可以很简短，也可以不评论直接打个招呼。`;

  // 获取最近几条对话作为上下文（包含awareness回复，让AI知道自己之前说了什么）
  const chat = chats.find(c => c.id === currentChatId);
  if (!chat) return;

  const recentMsgs = chat.messages
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-8)
    .map(m => ({
      role: m.role === 'assistant' ? 'assistant' : 'user',
      content: typeof m.content === 'string' ? m.content : (m.content?.text || m.content?.content || JSON.stringify(m.content))
    }));

  // 加载记忆
  const memoryP = typeof buildMemoryPrompt === 'function' ? buildMemoryPrompt() : '';
  const timeInfo = `当前时间：${new Date().toLocaleString('zh-CN')}`;

  try {
    const res = await fetch(`${api.url}/chat/completions`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${api.key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: api.model,
        messages: [
          { role: 'system', content: `${timeInfo}\n${memoryP}\n\n${systemNote}` },
          ...recentMsgs
        ],
        max_tokens: 300,
        stream: false
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (!text) return;

    // 显示为AI主动消息
    const box = document.getElementById('messages');
    const avatarStyle = avatars.ai ? `background-image:url(${avatars.ai});background-size:cover;background-position:center` : '';
    const now = Date.now();
    const timeStr = new Date(now).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    const msgEl = document.createElement('div');
    msgEl.className = 'msg ai ai-activity';
    msgEl.innerHTML = `
      <div class="msg-avatar" style="${avatarStyle}">${avatars.ai ? '' : 'A'}</div>
      <div class="msg-content">
        <div class="msg-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${timeStr}</div>
      </div>`;
    box.appendChild(msgEl);
    box.scrollTop = box.scrollHeight;

    // 存入对话历史
    chat.messages.push({ role: 'assistant', content: text, timestamp: now, isAwareness: true });
    saveChats();

  } catch(e) {
    console.log('[感知回复] 请求失败', e.message);
  } finally {
    _awarenessRunning = false;
  }
}
