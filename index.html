#   
<!DOCTYPE html>  
  
<html lang="zh">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">  
<title>AI</title>  
<style>  
:root {  
  --bg: #0e0e0e;  
  --bg2: #161616;  
  --bg3: #1e1e1e;  
  --border: #2a2a2a;  
  --border2: #333;  
  --text: #e8e8e8;  
  --text2: #999;  
  --text3: #555;  
  --accent: #ffffff;  
  --user-bubble: #1a1a1a;  
  --ai-bubble: #141414;  
  --radius: 12px;  
  --font: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;  
}  
  
- { margin:0; padding:0; box-sizing:border-box; }  
  
body {  
font-family: var(–font);  
background: var(–bg);  
color: var(–text);  
height: 100vh;  
overflow: hidden;  
display: flex;  
}  
  
/* ===== SCROLLBAR ===== */  
::-webkit-scrollbar { width: 4px; }  
::-webkit-scrollbar-track { background: transparent; }  
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 4px; }  
  
/* ===== SIDEBAR ===== */  
.sidebar {  
width: 260px;  
background: var(–bg2);  
border-right: 1px solid var(–border);  
display: flex;  
flex-direction: column;  
flex-shrink: 0;  
}  
  
.sidebar-top {  
padding: 20px 16px 12px;  
border-bottom: 1px solid var(–border);  
}  
  
.new-chat-btn {  
width: 100%;  
padding: 10px 14px;  
background: transparent;  
border: 1px solid var(–border2);  
border-radius: var(–radius);  
color: var(–text);  
font-size: 13px;  
cursor: pointer;  
transition: all 0.2s;  
display: flex;  
align-items: center;  
gap: 8px;  
font-family: var(–font);  
letter-spacing: 0.3px;  
}  
  
.new-chat-btn:hover { background: var(–bg3); border-color: var(–text3); }  
  
.new-chat-btn svg { opacity: 0.6; }  
  
.chat-list { flex: 1; overflow-y: auto; padding: 8px; }  
  
.chat-item {  
padding: 9px 12px;  
border-radius: 8px;  
margin-bottom: 2px;  
cursor: pointer;  
transition: all 0.15s;  
display: flex;  
align-items: center;  
gap: 8px;  
position: relative;  
group: true;  
}  
  
.chat-item:hover { background: var(–bg3); }  
.chat-item.active { background: var(–bg3); }  
  
.chat-item-title {  
flex: 1;  
font-size: 13px;  
color: var(–text2);  
overflow: hidden;  
text-overflow: ellipsis;  
white-space: nowrap;  
}  
  
.chat-item.active .chat-item-title { color: var(–text); }  
  
.chat-item-title input {  
background: transparent;  
border: none;  
width: 100%;  
font-size: 13px;  
outline: none;  
color: inherit;  
font-family: var(–font);  
}  
  
.chat-item-del {  
opacity: 0;  
color: var(–text3);  
font-size: 16px;  
transition: all 0.15s;  
line-height: 1;  
padding: 2px 4px;  
border-radius: 4px;  
}  
  
.chat-item:hover .chat-item-del { opacity: 1; }  
.chat-item-del:hover { color: var(–text2); background: var(–border); }  
  
.sidebar-bottom {  
padding: 12px;  
border-top: 1px solid var(–border);  
}  
  
.sidebar-action-btn {  
width: 100%;  
padding: 9px 12px;  
background: transparent;  
border: none;  
border-radius: 8px;  
color: var(–text2);  
font-size: 13px;  
cursor: pointer;  
transition: all 0.15s;  
display: flex;  
align-items: center;  
gap: 8px;  
text-align: left;  
font-family: var(–font);  
}  
  
.sidebar-action-btn:hover { background: var(–bg3); color: var(–text); }  
  
/* ===== WALLET IN SIDEBAR ===== */  
.wallet-strip {  
padding: 10px 12px;  
border-radius: 8px;  
border: 1px solid var(–border);  
margin-bottom: 8px;  
display: flex;  
align-items: center;  
justify-content: space-between;  
}  
  
.wallet-strip-label { font-size: 11px; color: var(–text3); }  
.wallet-strip-val { font-size: 13px; color: var(–text2); }  
  
/* ===== MAIN ===== */  
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }  
  
.chat-header {  
padding: 14px 20px;  
border-bottom: 1px solid var(–border);  
display: flex;  
align-items: center;  
justify-content: space-between;  
background: var(–bg);  
flex-shrink: 0;  
}  
  
.chat-title {  
font-size: 14px;  
font-weight: 500;  
color: var(–text);  
overflow: hidden;  
text-overflow: ellipsis;  
white-space: nowrap;  
max-width: 300px;  
}  
  
.header-right {  
display: flex;  
align-items: center;  
gap: 10px;  
flex-shrink: 0;  
}  
  
.time-display {  
font-size: 11px;  
color: var(–text3);  
font-variant-numeric: tabular-nums;  
}  
  
.header-btn {  
padding: 6px 12px;  
background: transparent;  
border: 1px solid var(–border2);  
border-radius: 6px;  
color: var(–text2);  
font-size: 12px;  
cursor: pointer;  
transition: all 0.15s;  
font-family: var(–font);  
}  
  
.header-btn:hover { border-color: var(–text3); color: var(–text); }  
  
/* ===== MESSAGES ===== */  
.messages {  
flex: 1;  
overflow-y: auto;  
overflow-x: hidden;  
padding: 24px 20px;  
display: flex;  
flex-direction: column;  
gap: 6px;  
}  
  
.msg {  
display: flex;  
gap: 12px;  
max-width: 72%;  
animation: fadeUp 0.25s ease;  
}  
  
@keyframes fadeUp {  
from { opacity:0; transform: translateY(8px); }  
to { opacity:1; transform: translateY(0); }  
}  
  
.msg.user { margin-left: auto; flex-direction: row-reverse; }  
  
.msg-avatar {  
width: 32px; height: 32px;  
border-radius: 50%;  
display: flex;  
align-items: center;  
justify-content: center;  
font-size: 12px;  
font-weight: 600;  
flex-shrink: 0;  
background: var(–bg3);  
border: 1px solid var(–border);  
background-size: cover;  
background-position: center;  
color: var(–text2);  
}  
  
.msg-content { flex: 1; min-width: 0; overflow: hidden; }  
  
.msg-text {  
font-size: 14px;  
line-height: 1.75;  
word-break: break-word;  
white-space: pre-wrap;  
overflow-wrap: break-word;  
}  
  
.msg.user .msg-text {  
background: var(–bg3);  
border: 1px solid var(–border2);  
color: var(–text);  
padding: 10px 14px;  
border-radius: var(–radius);  
border-bottom-right-radius: 4px;  
display: inline-block;  
max-width: 100%;  
}  
  
.msg.ai .msg-text {  
color: var(–text);  
padding: 10px 0;  
display: block;  
}  
  
.msg-meta {  
font-size: 10px;  
color: var(–text3);  
margin-top: 4px;  
display: flex;  
gap: 6px;  
align-items: center;  
}  
  
.msg.user .msg-meta { justify-content: flex-end; }  
  
/* AI message actions */  
.msg-actions {  
display: flex;  
gap: 4px;  
margin-top: 6px;  
opacity: 0;  
transition: opacity 0.2s;  
}  
  
.msg.ai:hover .msg-actions { opacity: 1; }  
  
.msg-action-btn {  
padding: 4px 8px;  
background: transparent;  
border: 1px solid var(–border);  
border-radius: 5px;  
font-size: 11px;  
cursor: pointer;  
color: var(–text3);  
transition: all 0.15s;  
font-family: var(–font);  
}  
  
.msg-action-btn:hover { border-color: var(–text3); color: var(–text2); }  
  
/* Thinking block */  
.thinking-block {  
margin-bottom: 8px;  
border: 1px solid var(–border);  
border-radius: 8px;  
overflow: hidden;  
}  
  
.thinking-toggle {  
display: flex;  
align-items: center;  
gap: 6px;  
padding: 8px 12px;  
cursor: pointer;  
font-size: 12px;  
color: var(–text3);  
user-select: none;  
transition: all 0.15s;  
}  
  
.thinking-toggle:hover { color: var(–text2); }  
  
.thinking-toggle .t-icon { transition: transform 0.2s; font-style: normal; }  
.thinking-toggle.open .t-icon { transform: rotate(90deg); }  
  
.thinking-content {  
display: none;  
padding: 10px 12px;  
font-size: 12px;  
color: var(–text3);  
line-height: 1.7;  
white-space: pre-wrap;  
word-break: break-word;  
border-top: 1px solid var(–border);  
}  
  
.thinking-content.show { display: block; }  
  
/* Code block */  
.code-block {  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: 8px;  
overflow: hidden;  
margin: 10px 0;  
max-width: 100%;  
}  
  
.code-header {  
padding: 8px 12px;  
display: flex;  
justify-content: space-between;  
align-items: center;  
border-bottom: 1px solid var(–border);  
}  
  
.code-lang { font-size: 11px; color: var(–text3); }  
  
.code-copy {  
background: transparent;  
color: var(–text3);  
border: 1px solid var(–border);  
padding: 3px 8px;  
border-radius: 4px;  
font-size: 11px;  
cursor: pointer;  
transition: all 0.15s;  
font-family: var(–font);  
}  
  
.code-copy:hover { color: var(–text2); border-color: var(–text3); }  
.code-copy.copied { color: #6ee7b7; border-color: #6ee7b7; }  
  
.code-body { padding: 14px; overflow-x: auto; background: var(–bg); max-width: 100%; }  
.code-body pre {  
margin: 0; color: #d4d4d4;  
font-family: ‘JetBrains Mono’, ‘Fira Code’, ‘Consolas’, monospace;  
line-height: 1.65; font-size: 13px;  
white-space: pre; word-break: normal; overflow-wrap: normal;  
}  
  
/* File card */  
.file-card {  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: 8px;  
padding: 12px 14px;  
margin: 8px 0;  
display: flex;  
align-items: center;  
gap: 12px;  
}  
  
.file-icon { font-size: 20px; opacity: 0.6; }  
.file-info { flex: 1; }  
.file-name { font-size: 13px; color: var(–text); }  
.file-size { font-size: 11px; color: var(–text3); margin-top: 2px; }  
  
.file-btn {  
padding: 6px 12px;  
background: transparent;  
border: 1px solid var(–border2);  
border-radius: 6px;  
color: var(–text2);  
font-size: 12px;  
cursor: pointer;  
transition: all 0.15s;  
font-family: var(–font);  
}  
  
.file-btn:hover { border-color: var(–text3); color: var(–text); }  
  
/* Activity divider */  
.activity-divider {  
display: flex;  
align-items: center;  
justify-content: center;  
padding: 8px 0;  
}  
  
.activity-divider span {  
font-size: 10px;  
color: var(–text3);  
letter-spacing: 0.5px;  
}  
  
/* AI awareness bubble */  
.msg.ai-activity .msg-text {  
color: var(–text2);  
font-size: 13px;  
}  
  
/* ===== INPUT AREA ===== */  
.input-area {  
padding: 12px 20px 20px;  
background: var(–bg);  
border-top: 1px solid var(–border);  
flex-shrink: 0;  
}  
  
.attach-chips {  
display: flex;  
gap: 6px;  
flex-wrap: wrap;  
margin-bottom: 8px;  
}  
  
.attach-chips:empty { display: none; }  
  
.chip {  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: 20px;  
padding: 4px 10px;  
font-size: 12px;  
display: inline-flex;  
align-items: center;  
gap: 5px;  
color: var(–text2);  
}  
  
.chip-del { cursor: pointer; color: var(–text3); transition: color 0.15s; }  
.chip-del:hover { color: var(–text); }  
  
.input-row { display: flex; align-items: flex-end; gap: 8px; }  
  
.attach-btn {  
width: 36px; height: 36px;  
background: transparent;  
border: 1px solid var(–border);  
border-radius: 8px;  
cursor: pointer;  
display: flex;  
align-items: center;  
justify-content: center;  
color: var(–text3);  
transition: all 0.15s;  
flex-shrink: 0;  
}  
  
.attach-btn:hover { border-color: var(–text3); color: var(–text2); }  
  
.input-wrap { flex: 1; position: relative; }  
  
textarea {  
width: 100%;  
padding: 10px 14px;  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: var(–radius);  
font-size: 14px;  
font-family: var(–font);  
resize: none;  
outline: none;  
color: var(–text);  
line-height: 1.5;  
transition: border-color 0.2s;  
}  
  
textarea::placeholder { color: var(–text3); }  
textarea:focus { border-color: var(–border2); }  
  
.send-btn {  
width: 36px; height: 36px;  
background: var(–text);  
color: var(–bg);  
border: none;  
border-radius: 8px;  
cursor: pointer;  
font-size: 16px;  
transition: all 0.15s;  
display: flex;  
align-items: center;  
justify-content: center;  
flex-shrink: 0;  
}  
  
.send-btn:hover { background: var(–text2); }  
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }  
  
/* Attach menu */  
.attach-menu {  
position: absolute;  
bottom: 44px;  
left: 0;  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: var(–radius);  
box-shadow: 0 8px 24px rgba(0,0,0,0.5);  
display: none;  
min-width: 180px;  
overflow: hidden;  
z-index: 100;  
}  
  
.attach-menu.show { display: block; animation: popIn 0.2s ease; }  
  
@keyframes popIn {  
from { opacity:0; transform: translateY(6px) scale(0.97); }  
to { opacity:1; transform: translateY(0) scale(1); }  
}  
  
.attach-menu-item {  
padding: 10px 14px;  
cursor: pointer;  
display: flex;  
align-items: center;  
gap: 10px;  
font-size: 13px;  
color: var(–text2);  
transition: all 0.15s;  
border-bottom: 1px solid var(–border);  
}  
  
.attach-menu-item:last-child { border: none; }  
.attach-menu-item:hover { background: var(–bg3); color: var(–text); }  
.attach-menu-item input { display: none; }  
  
/* ===== MODAL ===== */  
.modal {  
display: none;  
position: fixed;  
top: 0; left: 0; right: 0; bottom: 0;  
background: rgba(0,0,0,0.7);  
z-index: 1100;  
align-items: center;  
justify-content: center;  
backdrop-filter: blur(4px);  
}  
  
.modal.show { display: flex; animation: fadeIn 0.2s; }  
  
@keyframes fadeIn { from {opacity:0} to {opacity:1} }  
  
.modal-content {  
background: var(–bg2);  
border: 1px solid var(–border);  
border-radius: 16px;  
width: 90%;  
max-width: 620px;  
max-height: 85vh;  
overflow: hidden;  
display: flex;  
flex-direction: column;  
animation: slideUp 0.25s ease;  
}  
  
@keyframes slideUp {  
from { opacity:0; transform: translateY(20px); }  
to { opacity:1; transform: translateY(0); }  
}  
  
.modal-header {  
padding: 18px 22px;  
border-bottom: 1px solid var(–border);  
font-size: 15px;  
font-weight: 500;  
color: var(–text);  
display: flex;  
align-items: center;  
justify-content: space-between;  
}  
  
.modal-close {  
background: transparent;  
border: none;  
color: var(–text3);  
font-size: 18px;  
cursor: pointer;  
transition: color 0.15s;  
padding: 2px 6px;  
border-radius: 4px;  
}  
  
.modal-close:hover { color: var(–text); }  
  
.modal-body { flex: 1; overflow-y: auto; padding: 22px; }  
  
.modal-footer {  
padding: 14px 22px;  
border-top: 1px solid var(–border);  
display: flex;  
gap: 8px;  
justify-content: flex-end;  
background: var(–bg2);  
}  
  
/* Buttons */  
.btn {  
padding: 8px 16px;  
border-radius: 8px;  
font-size: 13px;  
cursor: pointer;  
border: none;  
transition: all 0.15s;  
font-family: var(–font);  
}  
  
.btn-primary {  
background: var(–text);  
color: var(–bg);  
}  
  
.btn-primary:hover { background: var(–text2); }  
  
.btn-secondary {  
background: transparent;  
color: var(–text2);  
border: 1px solid var(–border2);  
}  
  
.btn-secondary:hover { border-color: var(–text3); color: var(–text); }  
  
/* Forms */  
.form-group { margin-bottom: 16px; }  
  
.form-label {  
font-size: 12px;  
color: var(–text3);  
margin-bottom: 6px;  
display: block;  
letter-spacing: 0.3px;  
text-transform: uppercase;  
}  
  
.form-input, .form-select {  
width: 100%;  
padding: 9px 12px;  
background: var(–bg);  
border: 1px solid var(–border);  
border-radius: 8px;  
font-size: 13px;  
font-family: var(–font);  
color: var(–text);  
transition: border-color 0.2s;  
outline: none;  
}  
  
.form-input:focus, .form-select:focus { border-color: var(–border2); }  
.form-select option { background: var(–bg2); }  
.form-hint { font-size: 11px; color: var(–text3); margin-top: 5px; }  
  
/* API list */  
.api-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }  
  
.api-item {  
padding: 10px 12px;  
background: var(–bg);  
border: 1px solid var(–border);  
border-radius: 8px;  
display: flex;  
align-items: center;  
gap: 10px;  
cursor: pointer;  
transition: all 0.15s;  
}  
  
.api-item:hover { border-color: var(–border2); }  
.api-item.active { border-color: var(–text3); }  
  
.api-item-info { flex: 1; min-width: 0; }  
.api-item-name { font-size: 13px; color: var(–text); }  
.api-item-model { font-size: 11px; color: var(–text3); margin-top: 2px; }  
  
.api-item-del {  
color: var(–text3); font-size: 16px; cursor: pointer;  
transition: color 0.15s; padding: 2px 5px; border-radius: 4px;  
}  
  
.api-item-del:hover { color: var(–text2); }  
  
/* Memory notes */  
.memory-notes { display: flex; flex-wrap: wrap; gap: 12px; }  
  
.memory-note {  
width: calc(50% - 6px);  
min-width: 180px;  
min-height: 120px;  
border-radius: 10px;  
padding: 14px;  
position: relative;  
display: flex;  
flex-direction: column;  
gap: 8px;  
background: var(–bg3);  
border: 1px solid var(–border);  
transition: border-color 0.2s;  
}  
  
.memory-note:hover { border-color: var(–border2); }  
  
.memory-note-title {  
font-weight: 500;  
font-size: 13px;  
color: var(–text);  
border: none;  
background: transparent;  
width: 100%;  
outline: none;  
padding-bottom: 6px;  
border-bottom: 1px solid var(–border);  
font-family: var(–font);  
}  
  
.memory-note-body {  
flex: 1;  
font-size: 12px;  
color: var(–text2);  
border: none;  
background: transparent;  
width: 100%;  
resize: none;  
outline: none;  
line-height: 1.65;  
font-family: var(–font);  
min-height: 60px;  
}  
  
.memory-note-del {  
position: absolute;  
top: 10px; right: 10px;  
background: transparent;  
border: 1px solid transparent;  
border-radius: 4px;  
width: 22px; height: 22px;  
cursor: pointer;  
font-size: 14px;  
display: flex; align-items: center; justify-content: center;  
opacity: 0;  
transition: opacity 0.15s;  
color: var(–text3);  
}  
  
.memory-note:hover .memory-note-del { opacity: 1; }  
.memory-note-del:hover { border-color: var(–border); color: var(–text2); }  
  
.memory-note-time { font-size: 10px; color: var(–text3); text-align: right; }  
  
/* Toast */  
.toast {  
position: fixed;  
bottom: 24px;  
left: 50%;  
transform: translateX(-50%);  
background: var(–bg3);  
border: 1px solid var(–border2);  
color: var(–text);  
padding: 10px 18px;  
border-radius: 20px;  
font-size: 13px;  
z-index: 9999;  
animation: fadeUp 0.25s ease;  
white-space: nowrap;  
}  
  
/* Settings tabs */  
.settings-tabs {  
display: flex;  
gap: 0;  
border-bottom: 1px solid var(–border);  
margin-bottom: 20px;  
}  
  
.settings-tab {  
padding: 8px 14px;  
font-size: 12px;  
color: var(–text3);  
cursor: pointer;  
border-bottom: 2px solid transparent;  
margin-bottom: -1px;  
transition: all 0.15s;  
font-family: var(–font);  
background: transparent;  
border-top: none;  
border-left: none;  
border-right: none;  
}  
  
.settings-tab:hover { color: var(–text2); }  
.settings-tab.active { color: var(–text); border-bottom-color: var(–text); }  
  
.settings-panel { display: none; }  
.settings-panel.active { display: block; }  
  
/* Mobile */  
.mobile-toggle {  
display: none;  
position: fixed;  
top: 14px; left: 14px;  
z-index: 1000;  
background: var(–bg2);  
color: var(–text2);  
border: 1px solid var(–border);  
border-radius: 8px;  
width: 36px; height: 36px;

<script>  
// ========== GLOBAL STATE ==========  
let apiConfigs=[];  
let currentAPIId=null;  
let config={imgUrl:'',imgKey:'',neteaseToken:''};  
let chats=[];  
let currentChatId=null;  
let memoryNotes=[];  
let attachments={img:[],file:[],url:[],music:[]};  
let avatars={user:'',ai:''};  
let editingMessageIndex=null;  
const imgCache={};  
let wallet={balance:100};  
let userLocation=null;  
let lastMessageTime=null;  
  
// ========== INIT ==========  
window.onload=()=>{  
  loadAPIConfigs();  
  loadConfig();  
  loadChats();  
  loadMemory();  
  loadAvatars();  
  loadWallet();  
  loadLocation();  
  autoDetectIP();  
  if(chats.length===0){newChat();}else{switchChat(chats[0].id);}  
  renderChatList();  
  renderAPIList();  
  updateTime();  
  setInterval(updateTime,1000);  
  window.addEventListener('beforeunload',()=>{try{saveChats();}catch(e){}});  
  document.addEventListener('click',e=>{  
    const menu=document.getElementById('attachMenu');  
    const btn=document.querySelector('.attach-btn');  
    if(!menu.contains(e.target)&&e.target!==btn&&!btn.contains(e.target)){menu.classList.remove('show');}  
  });  
};  
  
function updateTime(){  
  const now=new Date();  
  document.getElementById('currentTime').textContent=now.toLocaleString('zh-CN',{  
    month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false  
  });  
}  
  
// ========== SETTINGS TABS ==========  
function switchSettingsTab(tab, btn){  
  document.querySelectorAll('.settings-tab').forEach(t=>t.classList.remove('active'));  
  document.querySelectorAll('.settings-panel').forEach(p=>p.classList.remove('active'));  
  btn.classList.add('active');  
  document.getElementById('panel-'+tab).classList.add('active');  
  // Populate specific panels when opened  
  if(tab==='memory') renderMemoryNotes();  
  if(tab==='phone') renderShortcutSettings();  
}  
  
// ========== AVATARS ==========  
function loadAvatars(){  
  const saved=localStorage.getItem('aiAvatars');  
  if(saved) avatars=JSON.parse(saved);  
  updateAvatarPreviews();

// Image compression utility  
function compressImage(file, callback, maxSizePx=400, quality=0.7){  
  const reader=new FileReader();  
  reader.onload=ev=>{  
    const img=new Image();  
    img.onload=()=>{  
      const canvas=document.createElement('canvas');  
      let w=img.width, h=img.height;  
      if(w>maxSizePx||h>maxSizePx){  
        if(w>h){h=Math.round(h*maxSizePx/w);w=maxSizePx;}  
        else{w=Math.round(w*maxSizePx/h);h=maxSizePx;}  
      }  
      canvas.width=w;canvas.height=h;  
      canvas.getContext('2d').drawImage(img,0,0,w,h);  
      callback(canvas.toDataURL('image/jpeg',quality));  
    };  
    img.src=ev.target.result;  
  };  
  reader.readAsDataURL(file);  
}

function formatTime(ts){

function formatInterval(ms){  
if(ms<1000) return `${ms}ms`;  
if(ms<60000) return `${(ms/1000).toFixed(0)}秒`;  
if(ms<3600000){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return s>0?`${m}分${s}秒`:`${m}分钟`;}  
const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return m>0?`${h}小时${m}分`:`${h}小时`;  
}

// ========== AI MESSAGE ACTIONS ==========  
function regenerateMessage(msgIndex){  
const chat=chats.find(c=>c.id===currentChatId);  
if(!chat||msgIndex<0||msgIndex>=chat.messages.length)return;  
const userMsg=chat.messages[msgIndex-1];  
if(!userMsg||userMsg.role!==‘user’){toast(‘找不到对应的用户消息’);return;}  
chat.messages=chat.messages.slice(0,msgIndex);saveChats();renderMessages(chat.messages);  
sendMessageWithContent(null);  
}  
  
function deleteRound(aiMsgIndex){  
const chat=chats.find(c=>c.id===currentChatId);if(!chat)return;  
const userIdx=aiMsgIndex-1;  
if(userIdx<0||chat.messages[userIdx]?.role!==‘user’)return;  
chat.messages.splice(userIdx,2);saveChats();renderMessages(chat.messages);toast(‘已删除本轮’);  
}  
  
function copyMessage(msgIndex){  
const chat=chats.find(c=>c.id===currentChatId);  
if(!chat||msgIndex<0||msgIndex>=chat.messages.length)return;  
const msg=chat.messages[msgIndex];  
let text=’’;  
const c=msg.content;  
if(typeof c===‘string’) text=c;  
else if(c&&typeof c===‘object’&&!Array.isArray(c)) text=c.text||c.content||’’;  
else if(Array.isArray(c)) text=c.filter(p=>p.type===‘text’).map(p=>p.text).join(’\n’);  
if(!text){toast(‘没有可复制的文本’);return;}  
navigator.clipboard.writeText(text).then(()=>toast(‘已复制’)).catch(()=>{  
const ta=document.createElement(‘textarea’);ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand(‘copy’);ta.remove();toast(‘已复制’);  
});  
}  
  
function editMessage(msgIndex){  
const chat=chats.find(c=>c.id===currentChatId);  
if(!chat||msgIndex<0||msgIndex>=chat.messages.length)return;  
if(msgIndex===0||chat.messages[msgIndex-1].role!==‘user’){toast(‘只能修改用户消息’);return;}  
const userMsg=chat.messages[msgIndex-1];  
const userText=typeof userMsg.content===‘string’?userMsg.content:(Array.isArray(userMsg.content)?(userMsg.content.find(p=>p.type===‘text’)?.text||’’):’’);  
document.getElementById(‘editContent’).value=userText;  
editingMessageIndex=msgIndex;  
document.getElementById(‘editModal’).classList.add(‘show’);  
}  
  
function closeEditModal(){document.getElementById(‘editModal’).classList.remove(‘show’);editingMessageIndex=null;}  
  
function saveEditedMessage(){  
if(editingMessageIndex===null)return;  
const chat=chats.find(c=>c.id===currentChatId);if(!chat)return;  
const newText=document.getElementById(‘editContent’).value.trim();  
if(!newText){toast(‘内容不能为空’);return;}  
chat.messages[editingMessageIndex-1].content=newText;  
chat.messages=chat.messages.slice(0,editingMessageIndex);  
saveChats();renderMessages(chat.messages);closeEditModal();sendMessageWithContent(null);  
}

input.value=’’;input.style.height=‘auto’;

userContent=text;

const patterns=[/【记忆[：:]?\s*(.+?)】[：:]\s*(.+)/g,/[记忆]\s*(?:(.+?)[：:])?\s*(.+)/g,/记住[：:]\s*(?:「(.+?)」[：:])?\s*(.+)/g];  
let found=false;  
patterns.forEach(re=>{let m;while((m=re.exec(text))!==null){const title=m[1]?m[1].trim():‘AI记录’;const body=m[2]?m[2].trim():m[1]?m[1].trim():’’;if(body){memoryNotes.unshift({id:Date.now()+Math.random(),title,body,time:Date.now()});found=true;}}});  
if(found){saveMemory();toast(‘AI 已更新记忆’);}  
}  
  
function exportMemory(){  
const blob=new Blob([JSON.stringify(memoryNotes,null,2)],{type:‘application/json’});  
const url=URL.createObjectURL(blob);const a=document.createElement(‘a’);a.href=url;a.download=‘memory_notes.json’;a.click();URL.revokeObjectURL(url);toast(‘已导出’);  
}  
  
function importMemory(){  
const input=document.createElement(‘input’);input.type=‘file’;input.accept=’.json’;  
input.onchange=e=>{  
const file=e.target.files[0];if(!file)return;  
const reader=new FileReader();  
reader.onload=ev=>{  
try{const data=JSON.parse(ev.target.result);if(Array.isArray(data)){memoryNotes=data;renderMemoryNotes();saveMemory();toast(‘已导入’);}else toast(‘格式不正确’);}  
catch(err){toast(‘导入失败：’+err.message);}  
};  
reader.readAsText(file);  
};  
input.click();  
}  
  
async function aiOrganizeMemory(){  
if(!currentAPIId){toast(‘请先配置 API’);return;}  
const api=apiConfigs.find(a=>a.id===currentAPIId);  
if(!api||!api.url||!api.key){toast(‘请先完善 API 配置’);return;}  
const memoryText=memoryNotes.map(n=>`【${n.title}】\n${n.body}`).join(’\n\n’);  
toast(‘AI 正在整理记忆…’);  
try{  
const res=await fetch(`${api.url}/chat/completions`,{method:‘POST’,headers:{‘Authorization’:`Bearer ${api.key}`,‘Content-Type’:‘application/json’},  
body:JSON.stringify({model:api.model,messages:[{role:‘user’,content:`整理以下记忆便签，合并重复内容，优化结构。只返回 JSON 数组格式 [{"title":"...","body":"..."}]，不要 markdown 代码块：\n\n${memoryText}`}],max_tokens:2048})});  
if(!res.ok) throw new Error(`HTTP ${res.status}`);  
const data=await res.json();  
let reply=data.choices[0].message.content.trim().replace(/^`[\w]*\s*/,'').replace(/\s*`$/,’’).trim();  
const arrMatch=reply.match(/([[\s\S]*])/);if(arrMatch)reply=arrMatch[1];  
const organized=JSON.parse(reply);  
if(Array.isArray(organized)){memoryNotes=organized.map(n=>({…n,id:Date.now()+Math.random(),time:Date.now()}));saveMemory();renderMemoryNotes();toast(‘整理完成’);}  
else throw new Error(‘返回格式错误’);  
}catch(e){toast(‘整理失败：’+e.message);}  
}

return p.slice(0,5000);  
}

async function doIPLocation(showToast){  
try{  
const res=await fetch(‘https://ip-api.com/json/?lang=zh-CN&fields=status,country,regionName,city,district,lat,lon,query’,{signal:AbortSignal.timeout(5000)});  
const d=await res.json();  
if(d.status===‘success’){  
userLocation={lat:d.lat,lng:d.lon,address:[d.country,d.regionName,d.city,d.district].filter(Boolean).join(’ ‘),city:d.city||d.regionName||d.country,ip:d.query,time:Date.now()};  
localStorage.setItem(‘aiUserLocation’,JSON.stringify(userLocation));  
const btn=document.getElementById(‘locationBtnText’);if(btn)btn.textContent=userLocation.city||‘已定位’;  
if(showToast)toast(`定位：${userLocation.address}`);return true;  
}  
}catch(e){}  
try{  
const res=await fetch(‘https://ipinfo.io/json’,{signal:AbortSignal.timeout(5000)});  
const d=await res.json();  
if(d.city){  
userLocation={lat:parseFloat(d.loc?.split(’,’)[0]||0),lng:parseFloat(d.loc?.split(’,’)[1]||0),address:[d.country,d.region,d.city].filter(Boolean).join(’ ’),city:d.city||d.region,ip:d.ip,time:Date.now()};

const btn=document.getElementById(‘locationBtnText’);if(btn)btn.textContent=userLocation.city||‘已定位’;  
if(showToast)toast(`定位：${userLocation.address}`);return true;  
}  
}catch(e){}  
return false;  
}

}  
  
// ========== WALLET TRANSFER ==========  
function parseAITransfer(text){  
const patterns=[/转账给你\s*(\d+(?:.\d+)?)\s*(?:小克币|克币)/,/给你转\s*(\d+(?:.\d+)?)\s*(?:小克币|克币)/,/转给你\s*(\d+(?:.\d+)?)\s*(?:小克币|克币)/,/向你转账\s*(\d+(?:.\d+)?)\s*(?:小克币|克币)/];  
for(const re of patterns){  
const m=text.match(re);if(m){  
const amount=parseFloat(m[1]);  
if(amount>0&&wallet.balance>=amount){wallet.balance=Math.round((wallet.balance-amount)*100)/100;saveWallet();renderWallet();toast(`收到 ${amount} 小克币！余额：${wallet.balance}`);}  
else if(amount>wallet.balance) toast(‘AI 余额不足’);  
return;  
}  
}  
}

// ========== SHORTCUT / PHONE AWARENESS ==========  
let shortcutConfig={enabled:true,serverUrl:’’,pollInterval:30,aiAutoReply:true};  
let appUsageHistory=[];  
let _pollTimer=null;  
let _lastPollTime=0;  
let _pendingActivities=[];  
  
function loadShortcutConfig(){  
try{  
const c=localStorage.getItem(‘shortcutConfig2’);if(c)shortcutConfig={…shortcutConfig,…JSON.parse(c)};  
const h=localStorage.getItem(‘appUsageHistory2’);if(h)appUsageHistory=JSON.parse(h);  
const p=localStorage.getItem(‘pendingActivities’);if(p)_pendingActivities=JSON.parse(p);  
}catch(e){}  
}  
  
function saveShortcutConfig(){localStorage.setItem(‘shortcutConfig2’,JSON.stringify(shortcutConfig));}  
  
function saveAppUsageHistory(){  
if(appUsageHistory.length>200)appUsageHistory=appUsageHistory.slice(-200);  
localStorage.setItem(‘appUsageHistory2’,JSON.stringify(appUsageHistory));  
localStorage.setItem(‘pendingActivities’,JSON.stringify(_pendingActivities));  
}  
  
function recordActivity(appName,timestamp,source){  
const ts=parseInt(timestamp)||Date.now();  
const recent=appUsageHistory.find(r=>r.appName===appName&&ts-r.timestamp<30000);  
if(recent)return;  
const record={appName,timestamp:ts,source:source||‘url’,shown:false};  
appUsageHistory.push(record);_pendingActivities.push(record);saveAppUsageHistory();  
insertActivityDivider(appName,ts);  
}  
  
function insertActivityDivider(appName,timestamp){  
const box=document.getElementById(‘messages’);if(!box)return;  
const timeStr=new Date(timestamp).toLocaleTimeString(‘zh-CN’,{hour:‘2-digit’,minute:‘2-digit’});  
const div=document.createElement(‘div’);div.className=‘activity-divider’;div.dataset.ts=timestamp;  
div.innerHTML=`<span>— ${appName} · ${timeStr} —</span>`;  
box.appendChild(div);box.scrollTop=box.scrollHeight;  
const chat=chats.find(c=>c.id===currentChatId);  
if(chat){chat.messages.push({role:‘activity’,appName,timestamp,content:appName});saveChats();}  
}  
  
function handleURLScheme(){  
const hash=window.location.hash;if(!hash||hash===’#’)return;  
try{  
const params=new URLSearchParams(hash.substring(1));  
const appName=params.get(‘app’);const ts=params.get(‘time’)||Date.now();  
if(!appName)return;  
recordActivity(appName,ts,‘url’);  
history.replaceState(null,’’,window.location.pathname+window.location.search);  
}catch(e){}  
}  
  
async function pollServer(){  
if(!shortcutConfig.serverUrl)return;  
try{  
const base=shortcutConfig.serverUrl.replace(//$/,’’).replace(//api/log$/,’’);  
const url=base+`/api/events?since=${_lastPollTime}&_=${Date.now()}`;  
const res=await fetch(url,{signal:AbortSignal.timeout(8000)});  
if(!res.ok)return;  
const events=await res.json();  
if(Array.isArray(events)&&events.length>0){  
events.forEach(e=>{if(e.appName)recordActivity(e.appName,e.timestamp||Date.now(),‘server’);});  
_lastPollTime=Date.now();  
}  
}catch(e){}  
}  
  
function startPolling(){  
stopPolling();  
if(!shortcutConfig.enabled||!shortcutConfig.serverUrl||shortcutConfig.pollInterval<=0)return;  
_pollTimer=setInterval(pollServer,shortcutConfig.pollInterval*1000);  
pollServer();  
}  
  
function stopPolling(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}}  
  
let _awarenessRunning=false;  
async function triggerAIAwareness(){  
if(!shortcutConfig.aiAutoReply)return;  
if(_pendingActivities.length===0)return;  
if(document.getElementById(‘sendBtn’)?.disabled)return;  
if(_awarenessRunning)return;  
_awarenessRunning=true;  
const pending=[…_pendingActivities];_pendingActivities=[];saveAppUsageHistory();  
const api=apiConfigs.find(a=>a.id===currentAPIId)||apiConfigs[0];  
if(!api||!api.key)return;  
const summary=pending.map(r=>{const t=new Date(r.timestamp).toLocaleTimeString(‘zh-CN’,{hour:‘2-digit’,minute:‘2-digit’});return `${t} 在用「${r.appName}」`;}).join(’、’);  
const systemNote=`[系统通知] 用户在离开聊天窗口期间的手机使用记录：${summary}。\n你可以自然地发一条消息——像你一直在陪着ta一样。可以很简短。`;  
const chat=chats.find(c=>c.id===currentChatId);if(!chat)return;  
const recentMsgs=chat.messages.filter(m=>m.role===‘user’||m.role===‘assistant’).slice(-6).map(m=>({role:m.role===‘assistant’?‘assistant’:‘user’,content:typeof m.content===‘string’?m.content:(m.content?.text||m.content?.content||’’)}));  
const memoryP=typeof buildMemoryPrompt===‘function’?buildMemoryPrompt():’’;  
const timeInfo=`当前时间：${new Date().toLocaleString('zh-CN')}`;  
try{  
const res=await fetch(`${api.url}/chat/completions`,{method:‘POST’,headers:{‘Authorization’:`Bearer ${api.key}`,‘Content-Type’:‘application/json’},body:JSON.stringify({model:api.model,messages:[{role:‘system’,content:`${timeInfo}\n${memoryP}\n\n${systemNote}`},…recentMsgs],max_tokens:300,stream:false})});  
if(!res.ok)return;  
const data=await res.json();  
const text=data.choices?.[0]?.message?.content?.trim();if(!text)return;  
const box=document.getElementById(‘messages’);  
const avatarStyle=avatars.ai?`background-image:url(${avatars.ai});background-size:cover;background-position:center`:’’;  
const now=Date.now();const timeStr=new Date(now).toLocaleTimeString(‘zh-CN’,{hour:‘2-digit’,minute:‘2-digit’});  
const msgEl=document.createElement(‘div’);msgEl.className=‘msg ai ai-activity’;  
msgEl.innerHTML=`<div class="msg-avatar" style="${avatarStyle}">${avatars.ai?'':'A'}</div><div class="msg-content"><div class="msg-text">${escapeHtml(text)}</div><div class="msg-meta">${timeStr}</div></div>`;  
box.appendChild(msgEl);box.scrollTop=box.scrollHeight;  
chat.messages.push({role:‘assistant’,content:text,timestamp:now,isAwareness:true});saveChats();  
}catch(e){}  
finally{_awarenessRunning=false;}  
}  
  
document.addEventListener(‘visibilitychange’,()=>{  
if(document.visibilityState===‘visible’&&_pendingActivities.length>0) setTimeout(triggerAIAwareness,1000);  
});  
  
function renderShortcutSettings(){  
const cfgUrl=document.getElementById(‘cfgServerUrl’);  
const cfgInterval=document.getElementById(‘cfgPollInterval’);  
const cfgAuto=document.getElementById(‘cfgAiAutoReply’);  
const cfgEn=document.getElementById(‘cfgEnabled2’);  
if(cfgUrl) cfgUrl.value=shortcutConfig.serverUrl||’’;  
if(cfgInterval) cfgInterval.value=shortcutConfig.pollInterval||30;  
if(cfgAuto) cfgAuto.checked=shortcutConfig.aiAutoReply;  
if(cfgEn) cfgEn.checked=shortcutConfig.enabled;  
// Render history  
const histList=document.getElementById(‘activityHistoryList’);  
if(histList){  
if(!appUsageHistory.length){histList.innerHTML=’<div style="font-size:11px;color:var(--text3);padding:8px 0">暂无记录</div>’;return;}  
histList.innerHTML=appUsageHistory.slice(-15).reverse().map(r=>{  
const t=new Date(r.timestamp).toLocaleTimeString(‘zh-CN’,{hour:‘2-digit’,minute:‘2-digit’});  
const d=new Date(r.timestamp).toLocaleDateString(‘zh-CN’,{month:‘2-digit’,day:‘2-digit’});  
return `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text3)">${d} ${t}</span><span style="color:var(--text2)">${r.appName}</span><span style="color:var(--text3);margin-left:auto;font-size:10px">${r.source||'url'}</span></div>`;  
}).join(’’);  
}  
}  
  
function saveShortcutSettings(){  
shortcutConfig.serverUrl=document.getElementById(‘cfgServerUrl’).value.trim();  
shortcutConfig.pollInterval=parseInt(document.getElementById(‘cfgPollInterval’).value)||30;  
shortcutConfig.aiAutoReply=document.getElementById(‘cfgAiAutoReply’).checked;  
shortcutConfig.enabled=document.getElementById(‘cfgEnabled2’).checked;  
saveShortcutConfig();startPolling();toast(‘感知设置已保存’);  
}  
  
function clearActivityHistory(){  
if(confirm(‘清空所有活动记录？’)){appUsageHistory=[];_pendingActivities=[];saveAppUsageHistory();renderShortcutSettings();toast(‘已清空’);}  
}  
  
function testActivity(){  
const apps=[‘小红书’,‘微信’,‘抖音’,‘淘宝’,‘B站’];  
const a=apps[Math.floor(Math.random()*apps.length)];  
recordActivity(a,Date.now(),‘test’);  
toast(`模拟活动：${a}`);  
}  
  
// ========== INIT SHORTCUT ==========  
(function(){  
loadShortcutConfig();  
handleURLScheme();  
window.addEventListener(‘hashchange’,handleURLScheme);  
startPolling();  
setTimeout(()=>{if(_pendingActivities.length>0)triggerAIAwareness();},2000);  
})();  
</script>

<script id="patch-scripts">
// ========== 🔥 调试工具 ========== //

function debugLog(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  console.log(`[${timestamp}] [${type.toUpperCase()}]`, message);
  
  const logEl = document.getElementById('debugLog');
  if (!logEl) return;
  
  const entry = document.createElement('div');
  entry.className = `debug-log ${type}`;
  entry.innerHTML = `<strong>[${timestamp}]</strong> ${escapeHtml(String(message))}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  
  while (logEl.children.length > 100) {
    logEl.removeChild(logEl.firstChild);
  }
}

function clearDebugLog() {
  const logEl = document.getElementById('debugLog');
  if (logEl) logEl.innerHTML = '';
  debugLog('日志已清空', 'info');
}

function toggleDebugPanel() {
  const panel = document.getElementById('debugPanel');
  if (panel) {
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) {
      debugLog('调试面板已打开', 'success');
    }
  }
}

// 测试服务器连接
async function testServerConnection() {
  debugLog('🧪 开始测试服务器连接...', 'info');
  debugLog(`服务器URL: ${shortcutConfig.serverUrl || '未设置'}`, 'info');
  
  if (!shortcutConfig.serverUrl) {
    debugLog('❌ 服务器URL未配置！请先在"手机感知"设置中配置', 'error');
    toast('请先配置服务器URL');
    return;
  }
  
  const baseUrl = shortcutConfig.serverUrl.replace(/\/$/, '');
  const endpoints = [
    '/api/events',
    '/events',
    '/api/log',
    '/log'
  ];
  
  for (const endpoint of endpoints) {
    const url = baseUrl + endpoint;
    debugLog(`测试端点: ${url}`, 'info');
    
    try {
      const res = await fetch(url, {
        method: 'GET',
        headers: { 'Accept': 'application/json' },
        signal: AbortSignal.timeout(5000)
      });
      
      debugLog(`HTTP ${res.status} ${res.statusText}`, res.ok ? 'success' : 'error');
      
      if (res.ok) {
        const text = await res.text();
        debugLog(`响应内容: ${text.substring(0, 200)}${text.length > 200 ? '...' : ''}`, 'success');
        
        try {
          const json = JSON.parse(text);
          debugLog(`✅ JSON格式正确: ${JSON.stringify(json)}`, 'success');
        } catch (e) {
          debugLog(`⚠️ 不是JSON格式`, 'warn');
        }
      }
    } catch (err) {
      debugLog(`❌ 请求失败: ${err.message}`, 'error');
    }
  }
  
  debugLog('🧪 测试完成', 'info');
}

// ========== 🔥 修复后端通信 ========== //

// 覆盖原有的pollServer函数
const _originalPollServer = window.pollServer;
window.pollServer = async function() {
  if (!shortcutConfig.serverUrl) {
    debugLog('服务器URL未配置，跳过轮询', 'warn');
    return;
  }
  
  try {
    const baseUrl = shortcutConfig.serverUrl.replace(/\/$/, '');
    const endpoints = [
      `/api/events?since=${_lastPollTime}`,
      `/api/events`,
      `/events?since=${_lastPollTime}`,
      `/events`
    ];
    
    let success = false;
    
    for (const endpoint of endpoints) {
      try {
        const url = `${baseUrl}${endpoint}&_t=${Date.now()}`;
        debugLog(`📡 轮询: ${url}`, 'info');
        
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          signal: AbortSignal.timeout(8000)
        });
        
        if (!res.ok) {
          debugLog(`HTTP ${res.status}`, 'error');
          continue;
        }
        
        const data = await res.json();
        debugLog(`✅ 收到响应: ${JSON.stringify(data)}`, 'success');
        
        // 🔥 支持多种数据格式
        let events = [];
        
        if (Array.isArray(data)) {
          events = data;
        } else if (data.events && Array.isArray(data.events)) {
          events = data.events;
        } else if (data.data && Array.isArray(data.data)) {
          events = data.data;
        } else if (data.appName || data.app || data.name) {
          events = [data];
        }
        
        debugLog(`解析到 ${events.length} 个事件`, 'info');
        
        if (events.length > 0) {
          events.forEach(e => {
            // 🔥 兼容多种字段名
            const appName = e.appName || e.app || e.name || e.app_name || e.application;
            const timestamp = e.timestamp || e.time || e.ts || e.created_at || Date.now();
            
            debugLog(`事件数据: appName=${appName}, timestamp=${timestamp}`, 'info');
            
            // 🔥 过滤无效数据
            if (!appName || appName === '1' || appName === 'undefined' || appName === 'null') {
              debugLog(`⚠️ 跳过无效数据: ${JSON.stringify(e)}`, 'warn');
              return;
            }
            
            debugLog(`📝 记录活动: ${appName}`, 'success');
            if (typeof recordActivity === 'function') {
              recordActivity(appName, timestamp, 'server');
            }
          });
          
          _lastPollTime = Date.now();
          success = true;
          break;
        }
        
      } catch (err) {
        debugLog(`端点 ${endpoint} 失败: ${err.message}`, 'error');
        continue;
      }
    }
    
    if (!success) {
      debugLog('❌ 所有端点均失败', 'error');
    }
    
  } catch (e) {
    debugLog(`轮询异常: ${e.message}`, 'error');
  }
};

// 覆盖原有的handleURLScheme函数
const _originalHandleURLScheme = window.handleURLScheme;
window.handleURLScheme = function() {
  const hash = window.location.hash;
  if (!hash || hash === '#') return;
  
  try {
    const params = new URLSearchParams(hash.substring(1));
    const appName = params.get('app');
    const timestamp = params.get('time') || params.get('timestamp') || params.get('ts') || Date.now();
    
    debugLog(`URL Scheme触发`, 'info');
    debugLog(`参数: app=${appName}, time=${timestamp}`, 'info');
    
    if (!appName) {
      debugLog('❌ 缺少app参数', 'error');
      return;
    }
    
    if (appName === '1' || appName === 'undefined' || appName === 'null') {
      debugLog(`❌ 无效的app名称: "${appName}"`, 'error');
      return;
    }
    
    debugLog(`✅ 记录URL活动: ${appName}`, 'success');
    if (typeof recordActivity === 'function') {
      recordActivity(appName, timestamp, 'url');
    }
    
    history.replaceState(null, '', window.location.pathname + window.location.search);
    
  } catch (e) {
    debugLog(`URL解析失败: ${e.message}`, 'error');
  }
};

// ========== 🔥 聊天背景功能 ========== //

let chatBackground = { type: 'none', url: '', opacity: 0.85 };

function loadChatBackground() {
  try {
    const saved = localStorage.getItem('chatBackground');
    if (saved) {
      chatBackground = JSON.parse(saved);
      applyChatBackground();
    }
  } catch (e) {
    console.error('加载背景失败', e);
  }
}

function saveChatBackground() {
  localStorage.setItem('chatBackground', JSON.stringify(chatBackground));
}

function applyChatBackground() {
  const messagesEl = document.getElementById('messages');
  if (!messagesEl) return;
  
  if (chatBackground.type === 'none' || !chatBackground.url) {
    messagesEl.style.backgroundImage = 'none';
  } else {
    messagesEl.style.backgroundImage = `url(${chatBackground.url})`;
  }
}

function toggleBgPanel() {
  const panel = document.getElementById('bgPanel');
  if (panel) {
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) {
      renderBgPresets();
    }
  }
}

const bgPresets = [
  { name: '极简黑', url: 'https://images.unsplash.com/photo-1557683316-973673baf926?w=800&q=80' },
  { name: '星空', url: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800&q=80' },
  { name: '渐变', url: 'https://images.unsplash.com/photo-1557682250-33bd709cbe85?w=800&q=80' },
  { name: '山峦', url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80' },
  { name: '海洋', url: 'https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=800&q=80' },
  { name: '城市', url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800&q=80' }
];

function renderBgPresets() {
  const grid = document.getElementById('bgPresetGrid');
  if (!grid) return;
  
  grid.innerHTML = bgPresets.map(bg => `
    <div class="bg-preset-item ${chatBackground.type === 'preset' && chatBackground.url === bg.url ? 'active' : ''}"
         style="background-image:url(${bg.url})"
         onclick="selectPresetBg('${bg.url}')"
         title="${bg.name}">
    </div>
  `).join('');
}

function selectPresetBg(url) {
  chatBackground.type = 'preset';
  chatBackground.url = url;
  saveChatBackground();
  applyChatBackground();
  renderBgPresets();
  if (typeof toast === 'function') toast('背景已更换');
  debugLog(`更换背景: ${url}`, 'success');
}

function uploadCustomBg(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (!file.type.startsWith('image/')) {
    if (typeof toast === 'function') toast('请选择图片文件');
    return;
  }
  
  if (file.size > 5 * 1024 * 1024) {
    if (typeof toast === 'function') toast('图片不能超过5MB');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = (e) => {
    chatBackground.type = 'custom';
    chatBackground.url = e.target.result;
    saveChatBackground();
    applyChatBackground();
    renderBgPresets();
    if (typeof toast === 'function') toast('自定义背景已设置');
    debugLog('上传自定义背景成功', 'success');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearBackground() {
  chatBackground.type = 'none';
  chatBackground.url = '';
  saveChatBackground();
  applyChatBackground();
  renderBgPresets();
  if (typeof toast === 'function') toast('背景已清除');
  debugLog('背景已清除', 'info');
}

// ========== 初始化 ========== //

(function() {
  // 加载背景
  setTimeout(loadChatBackground, 500);
  
  // Shift键快捷键
  let shiftCount = 0;
  let shiftTimer = null;
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Shift') {
      shiftCount++;
      clearTimeout(shiftTimer);
      shiftTimer = setTimeout(() => { shiftCount = 0; }, 1000);
      if (shiftCount === 3) {
        toggleDebugPanel();
        shiftCount = 0;
      }
    }
  });
  
  // 添加调试按钮到侧边栏
  setTimeout(() => {
    const footer = document.querySelector('.sidebar-footer');
    if (footer && !document.getElementById('debugBtn')) {
      const btn = document.createElement('button');
      btn.id = 'debugBtn';
      btn.className = 'sidebar-btn';
      btn.innerHTML = '<span>🔧 调试工具</span>';
      btn.onclick = toggleDebugPanel;
      footer.appendChild(btn);
    }
  }, 1500);
  
  debugLog('🚀 功能补丁加载完成', 'success');
  debugLog('快速按3次Shift键可打开调试面板', 'info');
})();

</script>
