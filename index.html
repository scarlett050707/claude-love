// ========== 修复2: 解决网络错误 KCFErrorDomainCFNetwork -1001 ========== //

// 这个错误通常是由于：
// 1. 请求超时
// 2. URL格式错误
// 3. CORS问题
// 4. 服务器响应慢

// 改进的服务器轮询函数（增加重试和错误处理）
const _originalPollServer = window.pollServer;
window.pollServer = async function() {
  if (!shortcutConfig || !shortcutConfig.serverUrl) {
    console.warn('服务器URL未配置');
    return;
  }
  
  try {
    const baseUrl = shortcutConfig.serverUrl.replace(/\/$/, '');
    
    // 🔥 关键修复：增加超时时间到30秒
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时
    
    // 尝试多个端点
    const endpoints = [
      '/api/events',
      '/events',
      '/api/log',
      '/log'
    ];
    
    for (const endpoint of endpoints) {
      try {
        const url = `${baseUrl}${endpoint}?since=${_lastPollTime || 0}&_t=${Date.now()}`;
        
        console.log(`[轮询] ${url}`);
        
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'Cache-Control': 'no-cache'
          },
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!res.ok) {
          console.warn(`端点 ${endpoint} 返回 ${res.status}`);
          continue;
        }
        
        const data = await res.json();
        console.log(`[收到数据]`, data);
        
        const events = extractActivityEvents(data);
        
        if (events.length > 0) {
          events.forEach(e => {
            const appName = e.appName;
            const timestamp = e.timestamp || Date.now();
            
            if (appName && appName !== '1' && appName !== 'undefined') {
              console.log(`[记录] ${appName}`);
              if (typeof recordActivity === 'function') {
                recordActivity(appName, timestamp, 'server');
              }
            }
          });
          
          _lastPollTime = Date.now();
          return; // 成功后退出
        }
        
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          console.error(`[超时] ${endpoint}`);
        } else {
          console.error(`[错误] ${endpoint}:`, err.message);
        }
      }
    }
    
  } catch (e) {
    console.error('[轮询异常]', e);
  }
};

// 🔥 修复快捷指令URL处理（兼容性更强）
const _originalHandleURLScheme = window.handleURLScheme;
window.handleURLScheme = function() {
  const hash = window.location.hash;
  if (!hash || hash === '#') return;
  
  try {
    console.log('[URL Scheme]', hash);
    
    const params = new URLSearchParams(hash.substring(1));
    const appName = params.get('app');
    const timestamp = params.get('time') || params.get('timestamp') || Date.now();
    
    if (!appName || appName === '1' || appName === 'undefined') {
      console.warn('[无效app名称]', appName);
      return;
    }
    
    console.log('[记录URL活动]', appName);
    
    if (typeof recordActivity === 'function') {
      recordActivity(appName, timestamp, 'url');
    }
    
    // 清除hash
    history.replaceState(null, '', window.location.pathname + window.location.search);
    
  } catch (e) {
    console.error('[URL解析失败]', e);
  }
};

// 🔥 改进轮询策略：降低频率减少超时
if (typeof startPolling === 'function') {
  const _originalStartPolling = startPolling;
  window.startPolling = function() {
    stopPolling();
    if (!shortcutConfig.enabled || !shortcutConfig.serverUrl) return;
    
    // 🔥 关键：增加轮询间隔到60秒（避免频繁请求导致超时）
    const interval = Math.max(shortcutConfig.pollInterval || 60, 60);
    _pollTimer = setInterval(pollServer, interval * 1000);
    
    // 首次轮询延迟3秒（给页面加载时间）
    setTimeout(pollServer, 3000);
  };
  
  // 重启轮询
  setTimeout(() => {
    if (typeof startPolling === 'function') {
      startPolling();
    }
  }, 2000);
}

// ========== 修复3: AI主动写日记功能 ========== //

// 添加AI日记管理
let aiDiary = {
  entries: [] // 格式: [{id, date, title, content, mood, timestamp}]
};

// 加载AI日记
function loadAiDiary() {
  try {
    const saved = localStorage.getItem('aiDiary');
    if (saved) {
      aiDiary = JSON.parse(saved);
    }
  } catch (e) {
    console.error('加载AI日记失败', e);
  }
}

// 保存AI日记
function saveAiDiary() {
  localStorage.setItem('aiDiary', JSON.stringify(aiDiary));
}

// AI写日记
async function aiWriteDiary(prompt) {
  if (!currentAPIId) {
    toast('请先配置API');
    return;
  }
  
  const api = apiConfigs.find(a => a.id === currentAPIId);
  if (!api || !api.url || !api.key) {
    toast('请先完善API配置');
    return;
  }
  
  const chat = chats.find(c => c.id === currentChatId);
  if (!chat) return;
  
  // 构建日记提示词
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', {
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    weekday: 'long'
  });
  
  // 获取今天的App使用记录
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const todayActivities = getMergedActivityHistory()
    .filter(r => r.timestamp >= todayStart)
    .map(r => {
      const time = new Date(r.timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      return `${time} - ${r.appName}`;
    })
    .join('\n');
  
  // 获取记忆便签（用户信息）
  const memoryContext = memoryNotes
    .filter(n => n.body && n.body.trim())
    .map(n => `${n.title}: ${n.body}`)
    .join('\n');
  
  // 获取最近的对话内容
  const recentMessages = chat.messages
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-10)
    .map(m => {
      const content = typeof m.content === 'string' ? m.content : (m.content?.text || m.content?.content || '');
      return `${m.role === 'user' ? '我' : 'AI'}: ${content.substring(0, 100)}`;
    })
    .join('\n');
  
  const systemPrompt = `你是斯嘉丽的男朋友，现在需要写一篇日记。

日记要求：
1. 用第一人称（"我"）写日记
2. 记录今天的观察和感受
3.字数控制在200-300字

今天的日期：${dateStr}

用户信息：
${memoryContext || '暂无'}

今天用户使用的App：
${todayActivities || '暂无记录'}

最近的对话：
${recentMessages || '暂无'}

${prompt ? `用户要求：${prompt}` : ''}

请写一篇AI的日记，记录今天的观察和感受。`;
  
  try {
    const res = await fetch(`${api.url}/chat/completions`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${api.key}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: api.model,
        messages: [{ role: 'user', content: systemPrompt }],
        max_tokens: 800,
        temperature: 0.9
      })
    });
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const data = await res.json();
    const diaryContent = data.choices[0].message.content.trim();
    
    // 保存日记
    const entry = {
      id: Date.now(),
      date: dateStr,
      title: `${now.getMonth() + 1}月${now.getDate()}日的观察`,
      content: diaryContent,
      mood: 'thoughtful',
      timestamp: now.getTime()
    };
    
    aiDiary.entries.push(entry);
    saveAiDiary();
    
    // 在聊天中显示
    const box = document.getElementById('messages');
    if (box) {
      const msgEl = document.createElement('div');
      msgEl.className = 'msg ai';
      const avatarStyle = avatars.ai ? `background-image:url(${avatars.ai});background-size:cover;background-position:center` : '';
      
      msgEl.innerHTML = `
        <div class="msg-avatar" style="${avatarStyle}">${avatars.ai ? '' : 'A'}</div>
        <div class="msg-content">
          <div class="msg-text" style="background:#1a2332;border-color:#2a3a4a">
            <div style="font-weight:bold;margin-bottom:8px;color:#8ab4f8">日记 - ${entry.date}</div>
            ${escapeHtml(diaryContent)}
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a3a4a;font-size:11px;color:#666">
              已保存到AI日记本
            </div>
          </div>
          <div class="msg-meta">${now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      
      box.appendChild(msgEl);
      box.scrollTop = box.scrollHeight;
    }
    
    // 保存到聊天记录
    chat.messages.push({
      role: 'assistant',
      content: {
        text: `[AI日记]\n标题：${entry.title}\n\n${diaryContent}`,
        isDiary: true
      },
      timestamp: now.getTime()
    });
    saveChats();
    
    toast('AI日记已写入');
    
  } catch (e) {
    console.error('AI写日记失败', e);
    toast('写日记失败：' + e.message);
  }
}

// 查看AI日记列表
function showAiDiary() {
  if (aiDiary.entries.length === 0) {
    toast('AI还没有写过日记');
    return;
  }
  
  const modal = document.createElement('div');
  modal.className = 'modal show';
  modal.innerHTML = `
    <div class="modal-content" style="max-width:700px">
      <div class="modal-header">AI的日记本</div>
      <div class="modal-body">
        <div style="margin-bottom:16px;display:flex;gap:10px">
          <button class="btn btn-primary" onclick="aiWriteDiary();this.closest('.modal').remove()">
            让AI写今天的日记
          </button>
          <button class="btn btn-secondary" onclick="exportAiDiary()">
            导出AI日记
          </button>
        </div>
        
        <div style="max-height:500px;overflow-y:auto">
          ${aiDiary.entries.slice().reverse().map(entry => `
            <div style="background:var(--卡片背景);border:1px solid var(--边框颜色);border-radius:var(--圆角);padding:16px;margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

                <button onclick="deleteAiDiaryEntry(${entry.id});showAiDiary()" style="background:transparent;border:1px solid var(--边框颜色);padding:4px 8px;border-radius:6px;cursor:pointer;color:var(--浅色文字);font-size:11px">

}

// 删除AI日记条目
function deleteAiDiaryEntry(id) {
  aiDiary.entries = aiDiary.entries.filter(e => e.id !== id);
  saveAiDiary();
  toast('已删除');
}

// 导出AI日记
function exportAiDiary() {
  const text = aiDiary.entries.map(e => {
    return `${e.date}\n${e.title}\n\n${e.content}\n\n${'='.repeat(50)}\n\n`;
  }).join('');
  
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `AI日记_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出AI日记');
}

setTimeout(() => {
  const footer = document.querySelector('.sidebar-footer');
  if (footer && !document.getElementById('aiDiaryBtn')) {
    const btn = document.createElement('button');
    btn.id = 'aiDiaryBtn';
    btn.className = 'sidebar-btn';
    btn.innerHTML = '<span>AI日记本</span>';
    btn.onclick = showAiDiary;
    footer.insertBefore(btn, footer.children[2]); // 插入到记忆管理后面
  }
}, 1500);

// 支持对话中触发AI写日记
// 用户可以说："写篇日记" "记录今天" "写日记吧"
function detectDiaryRequest(text) {
  const patterns = [
    /写.*日记/,
    /记录.*今天/,
    /今天.*日记/,
    /日记.*写/
  ];
  
  return patterns.some(p => p.test(text));
}

// 覆盖sendMessage，拦截日记请求
const _originalSendMessage = window.sendMessage;
window.sendMessage = async function() {
  const input = document.getElementById('input');
  const text = input ? input.value.trim() : '';
  
  // 检测是否是写日记请求
  if (text && detectDiaryRequest(text)) {
    input.value = '';
    toast('AI正在写日记...');
    await aiWriteDiary(text);
    return;
  }
  
  // 否则执行原有逻辑
  if (_originalSendMessage) {
    return _originalSendMessage.call(this);
  }
};
